<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <title>边狱巴士 导演控制台</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            display: flex;
            height: 100vh;
            font-family: "Microsoft YaHei", sans-serif;
            background-color: #1e1e1e;
            color: #eee;
            overflow: hidden;
        }

        /* 左侧控制台 */
        #console-panel {
            width: 400px;
            min-width: 350px;
            background: #252526;
            padding: 20px;
            overflow-y: auto;
            border-right: 1px solid #333;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        h1 {
            font-size: 20px;
            color: #e74c3c;
            text-align: center;
            margin-bottom: 10px;
            border-bottom: 1px solid #444;
            padding-bottom: 10px;
        }

        h2 {
            font-size: 16px;
            color: #ffca28;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .card {
            background: #333333;
            border-radius: 8px;
            padding: 15px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }

        .form-group {
            margin-bottom: 12px;
        }

        label {
            display: block;
            font-size: 13px;
            margin-bottom: 5px;
            color: #bbb;
        }

        input[type="number"] {
            width: 100%;
            background: #1e1e1e;
            border: 1px solid #444;
            color: #fff;
            padding: 8px;
            border-radius: 4px;
            outline: none;
            font-weight: bold;
        }

        input[type="number"]:focus {
            border-color: #e74c3c;
        }

        /* 动态列配置区 */
        #row-inputs-container {
            display: flex;
            gap: 8px;
            padding: 10px;
            background: #1e1e1e;
            border-radius: 6px;
            border: 1px inset #444;
            min-height: 50px;
            flex-wrap: wrap;
            margin-bottom: 10px;
        }

        .col-setting-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            background: #2a2a2a;
            padding: 5px;
            border-radius: 6px;
            border: 1px solid #444;
            width: calc(33.33% - 6px);
            /* 默认一行三个 */
        }

        .col-setting-box span {
            font-size: 12px;
            color: #ccc;
        }

        /* 按钮 */
        button {
            width: 100%;
            background: #444;
            color: white;
            border: 1px solid #555;
            padding: 10px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
            margin-top: 5px;
        }

        button:hover {
            background: #555;
        }

        button.primary {
            background: #27ae60;
            border-color: #2ecc71;
        }

        button.primary:hover {
            background: #2ecc71;
        }

        button.danger {
            background: #8b0000;
            border-color: #ff4444;
        }

        button.danger:hover {
            background: #a00000;
        }

        /* 右侧游戏画面 */
        #game-view {
            flex: 1;
            background: #000;
            display: flex;
            flex-direction: column;
        }

        #game-frame {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>

<body>

    <div id="console-panel">
        <h1>⛓️ 战斗 UI 控制台</h1>

        <div class="card">
            <h2>🎛️ 行动槽面板配置</h2>
            <div class="form-group">
                <label>总列数 (2~12)</label>
                <input type="number" id="cols-input" min="2" max="12" value="5" oninput="renderRowInputs()"
                    onchange="renderRowInputs()">
            </div>

            <label>每列技能数配置</label>
            <div id="row-inputs-container">
            </div>
            <button class="primary" onclick="applySettings()">应用配置并生成面板</button>
        </div>

        <div class="card">
            <h2>🎲 快捷操作下发</h2>
            <button onclick="sendReroll()">重新打乱面板 (Reroll)</button>
            <button class="danger" onclick="sendAuto()">触发自动选择 (Auto)</button>
        </div>

        <div class="card" style="opacity: 0.7; border: 1px dashed #555;">
            <p style="font-size: 12px; color: #999;">日志输出请查看浏览器控制台 (F12)。当游戏内连线完成后，控制台能收到 chainCompleted 事件回传。</p>
        </div>
    </div>

    <div id="game-view">
        <iframe id="game-frame"></iframe>
    </div>

    <script>
        // --- 通信基础设施 ---
        const query = new URLSearchParams(window.location.search);
        const sessionId = query.get('session') || 'demo1';
        const gameFrame = document.getElementById('game-frame');
        const channelName = `limbus-control-${sessionId}`;
        const controlChannel = typeof BroadcastChannel !== 'undefined' ? new BroadcastChannel(channelName) : null;

        let gameReady = false;
        let requestSeq = 0;
        const commandQueue = [];

        function initGameFrame() {
            const gameUrl = new URL('limbusgame.html', window.location.href);
            gameUrl.searchParams.set('session', sessionId);
            gameFrame.src = gameUrl.toString();
        }

        function buildCommand(command, payload = {}) {
            requestSeq += 1;
            return {
                type: 'limbus-command',
                sessionId,
                command,
                payload,
                requestId: `req-${Date.now()}-${requestSeq}`
            };
        }

        function dispatchCommand(command, payload = {}) {
            const message = buildCommand(command, payload);
            if (!gameReady) {
                commandQueue.push(message);
                requestReadyHandshake();
                return true;
            }

            let sent = false;
            if (gameFrame.contentWindow) {
                gameFrame.contentWindow.postMessage(message, window.location.origin);
                sent = true;
            }
            if (controlChannel) {
                controlChannel.postMessage(message);
                sent = true;
            }
            return sent;
        }

        function requestReadyHandshake() {
            const helloMessage = { type: 'limbus-event', sessionId, command: 'hello', payload: {} };
            if (gameFrame.contentWindow) gameFrame.contentWindow.postMessage(helloMessage, window.location.origin);
            if (controlChannel) controlChannel.postMessage(helloMessage);
        }

        function handleIncomingEvent(message) {
            if (!message || message.type !== 'limbus-event' || message.sessionId !== sessionId) return;

            if (message.command === 'ready') {
                gameReady = true;
                while (commandQueue.length > 0) {
                    const command = commandQueue.shift();
                    if (gameFrame.contentWindow) gameFrame.contentWindow.postMessage(command, window.location.origin);
                    if (controlChannel) controlChannel.postMessage(command);
                }
                return;
            }

            // 处理游戏层发来的回传事件
            if (message.command === 'chainCompleted') {
                console.log("🎮 [控制台收到事件] 玩家连线完成:", message.payload);
            }
        }

        window.addEventListener('message', (event) => {
            if (event.origin !== window.location.origin) return;
            handleIncomingEvent(event.data);
        });

        if (controlChannel) {
            controlChannel.addEventListener('message', (event) => handleIncomingEvent(event.data));
        }

        // --- 控制台业务逻辑 ---
        let colRowCounts = [2, 2, 2, 2, 2];

        function renderRowInputs() {
            const colsInput = document.getElementById('cols-input');
            const container = document.getElementById('row-inputs-container');
            let cols = parseInt(colsInput.value, 10);
            if (isNaN(cols) || cols < 2) cols = 2;
            if (cols > 12) cols = 12;

            container.innerHTML = '';
            for (let i = 0; i < cols; i++) {
                const val = (colRowCounts[i] !== undefined) ? colRowCounts[i] : 2;
                const box = document.createElement('div');
                box.className = 'col-setting-box';
                box.innerHTML = `
                    <span>第 ${i + 1} 列</span>
                    <input type="number" class="row-count-input" min="1" max="6" value="${val}">
                `;
                container.appendChild(box);
            }
        }

        function applySettings() {
            const colsInput = document.getElementById('cols-input');
            let nextCols = parseInt(colsInput.value, 10);

            const inputs = document.querySelectorAll('.row-count-input');
            colRowCounts = [];
            inputs.forEach(input => {
                let count = parseInt(input.value, 10) || 1;
                if (count < 1) count = 1;
                if (count > 6) count = 6;
                colRowCounts.push(count);
                input.value = count; // 校正非法输入
            });

            // 向游戏层发送配置更新指令
            dispatchCommand('setBoardConfig', { numCols: nextCols, colRowCounts: colRowCounts });
        }

        function sendReroll() {
            dispatchCommand('rerollBoard');
        }

        function sendAuto() {
            dispatchCommand('autoChain');
        }

        // 初始化
        window.onload = () => {
            renderRowInputs();
            initGameFrame();
            requestReadyHandshake();
            gameFrame.addEventListener('load', () => requestReadyHandshake());
        };
    </script>
</body>

</html>
