<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canvas 伪 3D 棋盘 + 磁性连线</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            user-select: none;
            overflow: hidden;
        }
        .controls {
            margin-bottom: 20px;
            background: #1e1e24;
            padding: 15px 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            display: flex;
            gap: 20px;
            z-index: 10;
        }
        .control-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        input[type="number"], input[type="range"] {
            padding: 5px;
            border: 1px solid #444;
            border-radius: 4px;
            background: #2a2a35;
            color: #fff;
        }
        input[type="number"] {
            width: 60px;
        }
        .canvas-container {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        canvas {
            border: 1px solid #333;
            background-color: #1a1a1a;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
        }
    </style>
</head>
<body>

    <div class="controls">
        <div class="control-group">
            <label for="colsInput">列数 (Cols):</label>
            <input type="number" id="colsInput" value="5" min="1" max="15">
        </div>
        <div class="control-group">
            <label for="rowsInput">行数 (Rows):</label>
            <input type="number" id="rowsInput" value="3" min="1" max="10">
        </div>
        <div class="control-group">
            <label for="fovInput">FOV:</label>
            <input type="range" id="fovInput" value="600" min="200" max="1000">
        </div>
    </div>

    <div class="canvas-container">
        <canvas id="checkerboard" width="900" height="550"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('checkerboard');
        const ctx = canvas.getContext('2d');

        const colsInput = document.getElementById('colsInput');
        const rowsInput = document.getElementById('rowsInput');
        const fovInput = document.getElementById('fovInput');

        let cols = parseInt(colsInput.value);
        let rows = parseInt(rowsInput.value);
        let fov = parseInt(fovInput.value);

        const tileSize = 80;
        const horizonY = 180;
        const camera = { x: 0, y: 280, z: -350 };

        // 核心连线交互状态
        let gridNodes = []; 
        let chain = [];     
        let isDragging = false;
        let mousePos = { x: 0, y: 0 };

        // 3D 投影函数
        function project(x3d, y3d, z3d, fovVal, cam, horizon) {
            const zRel = z3d - cam.z;
            if (zRel <= 0) return { x: 0, y: 0, scale: 0 };
            const scale = fovVal / zRel;
            return {
                x: canvas.width / 2 + (x3d - cam.x) * scale,
                y: horizon + (cam.y - y3d) * scale,
                scale: scale
            };
        }

        // 点到线段距离平方（V2 缝隙磁性穿透核心算法）
        function distToSegmentSquared(p, v, w) {
            const l2 = (w.x - v.x) ** 2 + (w.y - v.y) ** 2;
            if (l2 === 0) return (p.x - v.x) ** 2 + (p.y - v.y) ** 2;
            let t = ((p.x - v.x) * (w.x - v.x) + (p.y - v.y) * (w.y - v.y)) / l2;
            t = Math.max(0, Math.min(1, t));
            return (p.x - (v.x + t * (w.x - v.x))) ** 2 + (p.y - (v.y + t * (w.y - v.y))) ** 2;
        }

        // 渲染主循环
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            gridNodes = [];

            const xStart = -(cols * tileSize) / 2;

            // 1. 绘制 3D 经典黑白交替棋盘
            for (let z = 0; z < rows; z++) {
                for (let x = 0; x < cols; x++) {
                    const x3d = xStart + x * tileSize;
                    const z3d = z * tileSize;

                    const p1 = project(x3d, 0, z3d, fov, camera, horizonY);
                    const p2 = project(x3d + tileSize, 0, z3d, fov, camera, horizonY);
                    const p3 = project(x3d + tileSize, 0, z3d + tileSize, fov, camera, horizonY);
                    const p4 = project(x3d, 0, z3d + tileSize, fov, camera, horizonY);

                    ctx.beginPath();
                    ctx.moveTo(p1.x, p1.y);
                    ctx.lineTo(p2.x, p2.y);
                    ctx.lineTo(p3.x, p3.y);
                    ctx.lineTo(p4.x, p4.y);
                    ctx.closePath();

                    // 还原原版黑白交替色彩
                    if ((x + z) % 2 === 0) {
                        ctx.fillStyle = '#f0f0f0';
                    } else {
                        ctx.fillStyle = '#333333';
                    }
                    ctx.fill();
                    ctx.strokeStyle = '#cccccc';
                    ctx.stroke();

                    // 2. 实时计算每个棋盘格中心点作为连线圆钮
                    const centerX = x3d + tileSize / 2;
                    const centerZ = z3d + tileSize / 2;
                    const pCenter = project(centerX, 0, centerZ, fov, camera, horizonY);

                    const baseRadius = 16;
                    const nodeRadius = baseRadius * pCenter.scale; // 随远近透视缩放

                    gridNodes.push({
                        col: x,
                        row: z,
                        x: pCenter.x,
                        y: pCenter.y,
                        radius: nodeRadius
                    });
                }
            }

            // 3. 绘制每个网格上的连线节点状态
            gridNodes.forEach(node => {
                const isSelected = chain.some(n => n.col === node.col && n.row === node.row);

                ctx.beginPath();
                ctx.arc(node.x, node.y, node.radius, 0, Math.PI * 2);
                
                if (isSelected) {
                    ctx.fillStyle = '#ff7f11'; // 选中时的高亮色欲橙
                    ctx.shadowColor = '#ff7f11';
                    ctx.shadowBlur = 12;
                } else {
                    ctx.fillStyle = '#4a5568'; // 未选中的节点内衬
                    ctx.shadowBlur = 0;
                }
                ctx.fill();
                ctx.strokeStyle = '#ffffff';
                ctx.lineWidth = 2;
                ctx.stroke();
                ctx.shadowBlur = 0; 
            });

            // 4. 绘制 Limbus V2 标志性的发光粗连线
            if (chain.length > 0) {
                ctx.beginPath();
                ctx.moveTo(chain[0].x, chain[0].y);
                for (let i = 1; i < chain.length; i++) {
                    ctx.lineTo(chain[i].x, chain[i].y);
                }

                // 连线未满时，从最后一个选定节点动态向鼠标拉出橡皮筋线条
                if (isDragging && chain.length < cols) {
                    ctx.lineTo(mousePos.x, mousePos.y);
                }

                ctx.strokeStyle = '#ff7f11';
                ctx.lineWidth = 7;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.shadowColor = '#ff7f11';
                ctx.shadowBlur = 15;
                ctx.stroke();
                ctx.shadowBlur = 0; 
            }
        }

        // --- 手感控制事件处理器 ---

        function getMousePos(e) {
            const rect = canvas.getBoundingClientRect();
            return {
                x: e.clientX - rect.left,
                y: e.clientY - rect.top
            };
        }

        canvas.addEventListener('mousedown', (e) => {
            mousePos = getMousePos(e);
            
            let startingNode = null;
            let minDist = Infinity;

            // 扫描第一列节点触发
            gridNodes.forEach(node => {
                if (node.col === 0) { 
                    const dist = Math.hypot(mousePos.x - node.x, mousePos.y - node.y);
                    if (dist < node.radius * 2 && dist < minDist) {
                        minDist = dist;
                        startingNode = node;
                    }
                }
            });

            if (startingNode) {
                isDragging = true;
                chain = [startingNode];
                draw();
            }
        });

        canvas.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            mousePos = getMousePos(e);

            const lastNode = chain[chain.length - 1];

            // 【手感优化 1】同列内上下滑动直接无缝切换连接
            let sameColCandidate = null;
            let minSameColDist = Infinity;

            gridNodes.forEach(node => {
                if (node.col === lastNode.col && node.row !== lastNode.row) {
                    const dist = Math.hypot(mousePos.x - node.x, mousePos.y - node.y);
                    // 如果鼠标滑到了同列另一个节点的控制半径内
                    if (dist < node.radius * 1.8 && dist < minSameColDist) {
                        minSameColDist = dist;
                        sameColCandidate = node;
                    }
                }
            });

            if (sameColCandidate) {
                chain[chain.length - 1] = sameColCandidate; // 替换当前列节点
                draw();
                return; 
            }

            // 【手感优化 2】穿透磁性吸附至下一列
            let nextColCandidate = null;
            let minNextColDist = Infinity;
            const magneticThreshold = 55 * 55; 

            gridNodes.forEach(node => {
                if (node.col === lastNode.col + 1) {
                    const distSq = distToSegmentSquared(node, lastNode, mousePos);
                    if (distSq < magneticThreshold && distSq < minNextColDist) {
                        minNextColDist = distSq;
                        nextColCandidate = node;
                    }
                }
            });

            if (nextColCandidate) {
                chain.push(nextColCandidate);
                draw();
                return;
            }

            // 【手感优化 3】向左或往回移动时进行平滑回退处理
            if (chain.length > 1) {
                const prevNode = chain[chain.length - 2];
                const distToPrev = Math.hypot(mousePos.x - prevNode.x, mousePos.y - prevNode.y);
                
                if (distToPrev < prevNode.radius * 1.5 || mousePos.x < (lastNode.x - 20)) {
                    chain.pop();
                    draw();
                    return;
                }
            }

            draw();
        });

        window.addEventListener('mouseup', () => {
            if (isDragging) {
                isDragging = false;
                draw();
            }
        });

        // --- 动态表单控制器联动更新数量 ---
        colsInput.addEventListener('input', () => {
            cols = Math.max(1, parseInt(colsInput.value) || 5);
            chain = []; 
            draw();
        });

        rowsInput.addEventListener('input', () => {
            rows = Math.max(1, parseInt(rowsInput.value) || 3);
            chain = [];
            draw();
        });

        fovInput.addEventListener('input', () => {
            fov = parseInt(fovInput.value) || 600;
            draw();
        });

        // 首次初始化运行
        draw();
    </script>
</body>
</html>
