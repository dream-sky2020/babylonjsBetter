<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>示波器风格 2D 轮廓声波传导模拟器</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background-color: #030806;
      color: #a3e635;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
      display: flex;
    }

    /* 左侧控制面板 - 复古示波器风格 */
    #sidebar {
      width: 320px;
      height: 100vh;
      background: rgba(8, 18, 13, 0.9);
      backdrop-filter: blur(12px);
      border-right: 1px solid rgba(74, 222, 128, 0.2);
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      z-index: 10;
      box-shadow: 4px 0 24px rgba(0, 0, 0, 0.8);
      overflow-y: auto;
    }

    #sidebar h2 {
      font-size: 1.15rem;
      color: #4ade80;
      letter-spacing: 1px;
      display: flex;
      align-items: center;
      gap: 8px;
      text-transform: uppercase;
      font-family: monospace;
      border-bottom: 1px solid rgba(74, 222, 128, 0.3);
      padding-bottom: 8px;
    }

    .control-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .control-group label {
      font-size: 0.82rem;
      color: #86efac;
      display: flex;
      justify-content: space-between;
      font-family: monospace;
    }

    .control-group label span.val {
      color: #4ade80;
      font-weight: bold;
    }

    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 4px;
      border-radius: 2px;
      background: #14532d;
      outline: none;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #4ade80;
      cursor: pointer;
      box-shadow: 0 0 8px #4ade80;
    }

    select {
      background: #052e16;
      color: #86efac;
      border: 1px solid rgba(74, 222, 128, 0.3);
      padding: 8px;
      border-radius: 4px;
      outline: none;
      font-family: monospace;
      font-size: 0.85rem;
      cursor: pointer;
    }

    select:focus {
      border-color: #4ade80;
    }

    .tips {
      font-size: 0.78rem;
      color: #4ade80;
      opacity: 0.85;
      line-height: 1.5;
      background: rgba(5, 46, 22, 0.4);
      padding: 12px;
      border-radius: 4px;
      border-left: 3px solid #4ade80;
      font-family: monospace;
    }

    /* 画布与示波器屏面背景 */
    #canvas-container {
      flex: 1;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
      background: #020604;
      /* 网格屏面 */
      background-image: 
        linear-gradient(rgba(74, 222, 128, 0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(74, 222, 128, 0.05) 1px, transparent 1px);
      background-size: 30px 30px;
      background-position: center center;
    }

    canvas {
      display: block;
      cursor: crosshair;
    }
  </style>
</head>
<body>

  <div id="sidebar">
    <h2>OSCILLOSCOPE 2D</h2>

    <div class="control-group">
      <label>2D 轮廓图形 (Shape)</label>
      <select id="shapeType">
        <option value="square">正方形 (Square)</option>
        <option value="rectangle">长方形 (Rectangle)</option>
        <option value="circle">圆形 (Circle)</option>
        <option value="polygon">正六边形 (Hexagon)</option>
        <option value="star">五角星 (Star)</option>
      </select>
    </div>

    <div class="control-group">
      <label>荧光屏色彩 (Color)</label>
      <select id="colorTheme">
        <option value="#00ff41">CRT 经典绿 (Classic Green)</option>
        <option value="#38bdf8">示波器青蓝 (Cyan Glow)</option>
        <option value="#ff0055">脉冲红色 (Neon Red)</option>
        <option value="#fbbf24">琥珀黄 (Amber Tone)</option>
        <option value="#f5f5f5">黑白荧光 (Mono White)</option>
        <option value="#dbeafe">黑白冷荧光 (Cool White)</option>
      </select>
    </div>

    <div class="control-group">
      <label>预设波形 (Preset Wave)</label>
      <select id="wavePreset">
        <option value="ecg_sharp">ecg_sharp (尖锐心电)</option>
        <option value="soft">soft (柔和缓冲)</option>
        <option value="shock">shock (冲击爆发)</option>
      </select>
    </div>

    <hr style="border:0; border-top: 1px solid rgba(74,222,128,0.2);">

    <div class="tips">
      📟 <b>数据驱动波形：</b><br>
      • <b>形状点阵</b>：仅由线段拼接出的边界点数组渲染。<br>
      • <b>波对象独立</b>：每个波都自带强度、持续时间、衰减、抖动频率、波形函数。<br>
      • <b>点击注入</b>：点击前会先高亮可放置线段，按下后在该点注入波并显示标记。<br>
      • <b>三种预设</b>：支持 ecg_sharp / soft / shock 切换。
    </div>
  </div>

  <div id="canvas-container">
    <canvas id="canvas"></canvas>
  </div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    // Controls
    const shapeTypeSelect = document.getElementById('shapeType');
    const colorThemeSelect = document.getElementById('colorTheme');
    const wavePresetSelect = document.getElementById('wavePreset');

    let points = [];
    const N = 400;
    let width, height, centerX, centerY;

    // 形状点的视觉偏移缓存（每帧重算）
    let offsets = new Float32Array(N);
    // 波数据独立存储
    let waves = [];
    // 点击注入位置可视标记
    let impactMarkers = [];
    // 点击前的放置预览位置
    const hoverPlacement = { x: -1000, y: -1000, index: -1, distance: Infinity };

    const WAVE_PRESETS = {
      ecg_sharp: {
        intensity: 38,
        durationFrames: 90,
        decayPerFrame: 0.967,
        travelPerFrame: 2.6,
        spread: 7.2,
        jitterFreq: 0.42,
        jitterAmp: 0.06,
        maxRadiusRatio: 0.18,
        shapeFn: (x) => {
          const p = 0.05 * Math.exp(-Math.pow((x + 0.82) / 0.17, 2));
          const q = -0.42 * Math.exp(-Math.pow((x + 0.11) / 0.048, 2));
          const r = 1.62 * Math.exp(-Math.pow(x / 0.024, 2));
          const s = -0.66 * Math.exp(-Math.pow((x - 0.09) / 0.052, 2));
          const t = 0.10 * Math.exp(-Math.pow((x - 0.58) / 0.24, 2));
          return p + q + r + s + t;
        }
      },
      soft: {
        intensity: 26,
        durationFrames: 110,
        decayPerFrame: 0.975,
        travelPerFrame: 1.8,
        spread: 10.8,
        jitterFreq: 0.22,
        jitterAmp: 0.03,
        maxRadiusRatio: 0.22,
        shapeFn: (x) => {
          const p = 0.10 * Math.exp(-Math.pow((x + 0.95) / 0.34, 2));
          const q = -0.18 * Math.exp(-Math.pow((x + 0.18) / 0.12, 2));
          const r = 0.86 * Math.exp(-Math.pow(x / 0.09, 2));
          const s = -0.25 * Math.exp(-Math.pow((x - 0.16) / 0.12, 2));
          const t = 0.18 * Math.exp(-Math.pow((x - 0.78) / 0.34, 2));
          return p + q + r + s + t;
        }
      },
      shock: {
        intensity: 52,
        durationFrames: 58,
        decayPerFrame: 0.948,
        travelPerFrame: 3.5,
        spread: 5.8,
        jitterFreq: 0.78,
        jitterAmp: 0.10,
        maxRadiusRatio: 0.14,
        shapeFn: (x) => {
          const pre = -0.32 * Math.exp(-Math.pow((x + 0.20) / 0.06, 2));
          const spike = 2.00 * Math.exp(-Math.pow(x / 0.018, 2));
          const post = -0.72 * Math.exp(-Math.pow((x - 0.07) / 0.045, 2));
          const tail = 0.06 * Math.exp(-Math.pow((x - 0.42) / 0.16, 2));
          return pre + spike + post + tail;
        }
      }
    };

    function getCurrentPreset() {
      return WAVE_PRESETS[wavePresetSelect.value] || WAVE_PRESETS.ecg_sharp;
    }

    function resize() {
      const container = document.getElementById('canvas-container');
      width = canvas.width = container.clientWidth;
      height = canvas.height = container.clientHeight;
      centerX = width / 2;
      centerY = height / 2;
      generateShape();
    }

    // 生成 2D 图形基础外框点及法线方向
    function generateShape() {
      points = [];
      waves = [];
      impactMarkers = [];
      offsets = new Float32Array(N);
      hoverPlacement.index = -1;
      hoverPlacement.distance = Infinity;
      const type = shapeTypeSelect.value;
      const size = Math.min(width, height) * 0.22;

      for (let i = 0; i < N; i++) {
        const t = (i / N) * Math.PI * 2;
        let bx = 0, by = 0;
        let nx = 0, ny = 0;

        if (type === 'circle') {
          bx = Math.cos(t) * size;
          by = Math.sin(t) * size;
          nx = Math.cos(t);
          ny = Math.sin(t);
        } else if (type === 'square' || type === 'rectangle') {
          const w = size * (type === 'rectangle' ? 1.4 : 1);
          const h = size * (type === 'rectangle' ? 0.8 : 1);
          const p = i / N;
          if (p < 0.25) {
            const sub = p / 0.25;
            bx = -w + sub * 2 * w; by = -h; nx = 0; ny = -1;
          } else if (p < 0.5) {
            const sub = (p - 0.25) / 0.25;
            bx = w; by = -h + sub * 2 * h; nx = 1; ny = 0;
          } else if (p < 0.75) {
            const sub = (p - 0.5) / 0.25;
            bx = w - sub * 2 * w; by = h; nx = 0; ny = 1;
          } else {
            const sub = (p - 0.75) / 0.25;
            bx = -w; by = h - sub * 2 * h; nx = -1; ny = 0;
          }
        } else if (type === 'polygon') {
          const sides = 6;
          const angleStep = (Math.PI * 2) / sides;
          const sideIndex = Math.floor(t / angleStep);
          const a1 = sideIndex * angleStep;
          const a2 = (sideIndex + 1) * angleStep;
          const ratio = (t - a1) / angleStep;

          const x1 = Math.cos(a1) * size, y1 = Math.sin(a1) * size;
          const x2 = Math.cos(a2) * size, y2 = Math.sin(a2) * size;
          bx = x1 + (x2 - x1) * ratio;
          by = y1 + (y2 - y1) * ratio;

          const len = Math.hypot(bx, by);
          nx = bx / len; ny = by / len;
        } else if (type === 'star') {
          const rOuter = size;
          const rInner = size * 0.45;
          const pts = 10;
          const sideIndex = Math.floor(t / ((Math.PI * 2) / pts));
          const a1 = sideIndex * ((Math.PI * 2) / pts);
          const a2 = (sideIndex + 1) * ((Math.PI * 2) / pts);
          const r1 = sideIndex % 2 === 0 ? rOuter : rInner;
          const r2 = sideIndex % 2 === 0 ? rInner : rOuter;
          const ratio = (t - a1) / ((Math.PI * 2) / pts);

          bx = (r1 * Math.cos(a1)) + ((r2 * Math.cos(a2)) - (r1 * Math.cos(a1))) * ratio;
          by = (r1 * Math.sin(a1)) + ((r2 * Math.sin(a2)) - (r1 * Math.sin(a1))) * ratio;

          const len = Math.hypot(bx, by);
          nx = bx / len; ny = by / len;
        }

        points.push({
          baseX: bx, baseY: by,
          nx: nx, ny: ny
        });
      }
    }

    function createWaveAt(centerIndex, overrides = {}) {
      const cfg = { ...getCurrentPreset(), ...overrides };
      waves.push({
        centerIndex,
        radius: 0,
        age: 0,
        intensity: cfg.intensity,
        durationFrames: cfg.durationFrames,
        decayPerFrame: cfg.decayPerFrame,
        travelPerFrame: cfg.travelPerFrame,
        spread: cfg.spread,
        jitterFreq: cfg.jitterFreq,
        jitterAmp: cfg.jitterAmp,
        maxRadius: N * cfg.maxRadiusRatio,
        shapeFn: cfg.shapeFn
      });
      impactMarkers.push({ index: centerIndex, ttl: 24 });
    }

    // 修复1：计算距离时，加入 offsets 的动态偏移量，以匹配视觉上的线段位置
    function findClosestPointIndex(x, y) {
          let closestIdx = -1;
          let minDist = Infinity;

          for (let i = 0; i < N; i++) {
            const pt = points[i];
            const currentOffset = offsets[i] || 0; 
            
            // 必须加上法线偏移 (nx, ny * currentOffset)，才能拿到线段真实的渲染坐标
            const worldX = centerX + pt.baseX + pt.nx * currentOffset;
            const worldY = centerY + pt.baseY + pt.ny * currentOffset;
            
            const dist = Math.hypot(worldX - x, worldY - y);
            if (dist < minDist) {
              minDist = dist;
              closestIdx = i;
            }
          }

          return { index: closestIdx, distance: minDist };
        }
    // 获取画布内局部坐标（统一用于预览与点击落点）
    function getCanvasPos(e) {
          const rect = canvas.getBoundingClientRect();
          return {
            x: e.clientX - rect.left,
            y: e.clientY - rect.top
          };
        }

    function updateHoverPlacementFromEvent(e) {
      const pos = getCanvasPos(e);
      hoverPlacement.x = pos.x;
      hoverPlacement.y = pos.y;

      const target = findClosestPointIndex(pos.x, pos.y);
      hoverPlacement.index = target.index;
      hoverPlacement.distance = target.distance;
    }

    function placeWaveFromEvent(e) {
      const pos = getCanvasPos(e);
      const target = findClosestPointIndex(pos.x, pos.y);
      if (target.index !== -1 && target.distance < 140) {
        createWaveAt(target.index);
      }
    }



    function updateWavesAndOffsets() {
      // 1) 更新波自身状态
      for (let w = waves.length - 1; w >= 0; w--) {
        const wave = waves[w];
        wave.age += 1;
        wave.radius += wave.travelPerFrame;
        wave.intensity *= wave.decayPerFrame;

        if (
          wave.age > wave.durationFrames ||
          wave.intensity < 0.25 ||
          wave.radius > wave.maxRadius
        ) {
          waves.splice(w, 1);
        }
      }

      // 2) 叠加每个波对每个点的影响
      offsets = new Float32Array(N);
      for (let i = 0; i < N; i++) {
        let totalOffset = 0;

        for (let w = 0; w < waves.length; w++) {
          const wave = waves[w];
          let dist = Math.abs(i - wave.centerIndex);
          if (dist > N / 2) dist = N - dist;

          const x = (dist - wave.radius) / wave.spread;
          if (x > -1.25 && x < 1.15) {
            const localFalloff = Math.exp(-Math.pow(x / 0.72, 2));
            const life = 1 - wave.age / wave.durationFrames;
            const baseShape = wave.shapeFn(x) * localFalloff * life;
            const jitter = Math.sin(wave.age * wave.jitterFreq + dist * 0.35) * wave.jitterAmp;
            totalOffset += wave.intensity * (baseShape + jitter * 0.10 * life);
          }
        }

        offsets[i] = totalOffset;
      }
    }

    function drawImpactMarkers(color) {
      for (let m = impactMarkers.length - 1; m >= 0; m--) {
        const marker = impactMarkers[m];
        marker.ttl -= 1;
        if (marker.ttl <= 0) {
          impactMarkers.splice(m, 1);
          continue;
        }

        const alpha = marker.ttl / 24;
        const pt = points[marker.index];
        const offset = offsets[marker.index] || 0;
        const x = centerX + pt.baseX + pt.nx * offset;
        const y = centerY + pt.baseY + pt.ny * offset;

        ctx.save();
        ctx.strokeStyle = color;
        ctx.fillStyle = color;
        ctx.globalAlpha = alpha;
        ctx.lineWidth = 1.5;
        ctx.shadowBlur = 8;
        ctx.shadowColor = color;
        ctx.beginPath();
        ctx.arc(x, y, 3 + (1 - alpha) * 4, 0, Math.PI * 2);
        ctx.stroke();
        ctx.beginPath();
        ctx.arc(x, y, 1.8, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
    }

    function drawPlacementPreview(color) {
      if (hoverPlacement.index === -1 || hoverPlacement.distance >= 140) return;

      const highlightColor = color === '#f5f5f5' || color === '#dbeafe' ? '#ffffff' : '#e5e7eb';
      const span = 8; // 高亮一小段线段，提示“按下会放在这里”

      ctx.save();
      ctx.strokeStyle = highlightColor;
      ctx.lineWidth = 3.4;
      ctx.shadowBlur = 14;
      ctx.shadowColor = highlightColor;
      ctx.globalAlpha = 0.95;
      ctx.beginPath();

      for (let step = -span; step <= span; step++) {
        const idx = (hoverPlacement.index + step + N) % N;
        const pt = points[idx];
        const offset = offsets[idx] || 0;
        const x = centerX + pt.baseX + pt.nx * offset;
        const y = centerY + pt.baseY + pt.ny * offset;

        if (step === -span) {
          ctx.moveTo(x, y);
        } else {
          ctx.lineTo(x, y);
        }
      }
      ctx.stroke();
      ctx.restore();
    }

    // 渲染图层（残影 + 发光线条 + 注入点标记）
    function draw() {
      ctx.fillStyle = 'rgba(2, 6, 4, 0.25)';
      ctx.fillRect(0, 0, width, height);

      updateWavesAndOffsets();
      if (
        hoverPlacement.x >= 0 &&
        hoverPlacement.y >= 0 &&
        hoverPlacement.x <= width &&
        hoverPlacement.y <= height
      ) {
        const target = findClosestPointIndex(hoverPlacement.x, hoverPlacement.y);
        hoverPlacement.index = target.index;
        hoverPlacement.distance = target.distance;
      }
      const color = colorThemeSelect.value;

      ctx.strokeStyle = color;
      ctx.lineWidth = 2.2;
      ctx.shadowBlur = 10;
      ctx.shadowColor = color;

      ctx.beginPath();
      for (let i = 0; i < N; i++) {
        const pt = points[i];
        const offset = offsets[i];

        // 沿着法线偏移
        const x = centerX + pt.baseX + pt.nx * offset;
        const y = centerY + pt.baseY + pt.ny * offset;

        if (i === 0) {
          ctx.moveTo(x, y);
        } else {
          ctx.lineTo(x, y);
        }
      }
      ctx.closePath();
      ctx.stroke();
      drawPlacementPreview(color);
      drawImpactMarkers(color);
    }

    // 仅在画布上处理输入，避免坐标系不一致与重复触发
    canvas.addEventListener('pointerdown', placeWaveFromEvent);
    canvas.addEventListener('pointermove', updateHoverPlacementFromEvent);
    canvas.addEventListener('pointerleave', () => {
      hoverPlacement.index = -1;
      hoverPlacement.distance = Infinity;
    });

    window.addEventListener('resize', resize);
    shapeTypeSelect.addEventListener('change', generateShape);

    function loop() {
      draw();
      requestAnimationFrame(loop);
    }

    resize();
    loop();
  </script>
</body>
</html>
