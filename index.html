<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Web 调试入口</title>
    <style>
      :root {
        color-scheme: dark;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Segoe UI", "Microsoft YaHei", sans-serif;
        background: #101318;
        color: #e8edf2;
      }
      .wrap {
        width: min(960px, 92vw);
        margin: 40px auto;
      }
      h1 {
        margin: 0 0 10px;
        font-size: 26px;
      }
      p {
        margin: 0 0 24px;
        color: #a6b0be;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
        gap: 12px;
      }
      a {
        display: block;
        padding: 14px 16px;
        border-radius: 10px;
        text-decoration: none;
        border: 1px solid #2d3542;
        background: #171c25;
        color: #e8edf2;
      }
      a:hover {
        border-color: #4a7bff;
        background: #1c2431;
      }
      .hint {
        margin-top: 22px;
        font-size: 13px;
        color: #8d99aa;
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <h1>网页端调试界面</h1>
      <p>此页面仅作为调试导航，不再自动启动游戏场景或其它测试模块。</p>
      <section class="grid">
        <a href="/tools/sprite-anchor-editor/index.html">Sprite Anchor Editor</a>
        <a href="/tools/sprite-animation-editor/index.html">Sprite Animation Editor</a>
        <a href="/tools/particle-editor/index.html">Particle Editor</a>
        <a href="/tools/target-link-lab/index.html">Target Link Lab</a>
        <a href="/tools/battle-lab/battle.html">Battle Lab</a>
        <a href="/tools/oscilloscope-ui-lab/index.html">Oscilloscope UI Lab</a>
        <a href="/tools/skill-lab/skilleffect.html">Skill Effect Lab</a>
        <a href="/tools/render-lab/energy-line.html">Energy Line Lab</a>
        <a href="/tools/render-lab/energy_line_dynamic_erosion.html">Energy Erosion Lab</a>
        <a href="/tools/galgame-lab/galgame-console.html">Galgame Console</a>
        <a href="/tools/limbus-lab/limbusgame-console.html">Limbus Console</a>
        <a href="/tools/limbus-lab/rpg-battle.html">RPG Battle Debug</a>
      </section>
      <div class="hint">如果只想调一个页面，直接访问对应链接即可。</div>
    </main>
  </body>
</html>
