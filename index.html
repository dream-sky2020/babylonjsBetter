<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Babylon.js 伪2D场景</title>
    <style>
      html,
      body {
        margin: 0;
        width: 100vw;
        height: 100vh;
        position: relative;
        overflow: hidden;
      }
      #renderCanvas {
        width: 100%;
        height: 100%;
        display: block;
        touch-action: none;
      }
      #galgame-overlay {
        position: absolute;
        inset: 0;
        z-index: 20;
        display: none;
        background: transparent;
      }
      #galgame-overlay.visible {
        display: block;
      }
      #galgame-frame {
        width: 100%;
        height: 100%;
        border: 0;
        background: transparent;
      }
      .overlay-btn {
        position: absolute;
        left: 12px;
        z-index: 30;
        border: 1px solid rgba(255, 255, 255, 0.45);
        border-radius: 8px;
        padding: 6px 12px;
        background: rgba(9, 13, 24, 0.72);
        color: #f1f4ff;
        cursor: pointer;
      }
      #toggle-galgame-btn {
        top: 12px;
      }
      #open-battle-btn {
        top: 48px;
      }
    </style>
  </head>
  <body>
    <canvas id="renderCanvas"></canvas>
    <button id="toggle-galgame-btn" class="overlay-btn" type="button">打开对话层</button>
    <button id="open-battle-btn" class="overlay-btn" type="button">打开战斗层</button>
    <div id="galgame-overlay">
      <iframe id="galgame-frame" title="Galgame Overlay" loading="lazy"></iframe>
    </div>
    <script src="https://cdn.babylonjs.com/babylon.js"></script>
    <script type="module">
      import { EventBus } from "./event/event-bus.js";
      import { EntityStateModule } from "./event/entity-state-module.js";
      import { GAME_EVENTS } from "./event/events.js";
      import { InputModule } from "./input/input-module.js";
      import { RhythmModule } from "./rhythm/rhythm-module.js";
      import { ParticleModule } from "./vfx/particle-module.js";
      import { ObservableGameManager } from "./game-manager.js";

      const canvas = document.getElementById("renderCanvas");
      const galgameOverlay = document.getElementById("galgame-overlay");
      const galgameFrame = document.getElementById("galgame-frame");
      const toggleGalgameBtn = document.getElementById("toggle-galgame-btn");
      const openBattleBtn = document.getElementById("open-battle-btn");
      const engine = new BABYLON.Engine(canvas, true);
      const scene = new BABYLON.Scene(engine);
      scene.clearColor = new BABYLON.Color4(0.07, 0.09, 0.14, 1);

      
      const camera = new BABYLON.FreeCamera("camera", new BABYLON.Vector3(0, 0, -10), scene);
      camera.mode = BABYLON.Camera.ORTHOGRAPHIC_CAMERA;

      // --- 在这里添加管道配置 ---
      const pipeline = new BABYLON.DefaultRenderingPipeline(
        "defaultPipeline", // 管道名称
        true,              // 启用 HDR (如果不需要可设为 false)
        scene,
        [camera]           // 指定相机
      );

      // 开启 FXAA
      pipeline.fxaaEnabled = true;


      const syncOrtho = () => {
        const ratio = engine.getRenderWidth() / engine.getRenderHeight();
        const halfHeight = 6;
        camera.orthoTop = halfHeight;
        camera.orthoBottom = -halfHeight;
        camera.orthoLeft = -halfHeight * ratio;
        camera.orthoRight = halfHeight * ratio;
      };
      syncOrtho();

      const eventBus = new EventBus();
      const manager = new ObservableGameManager(engine, scene, camera, eventBus);
      const entityStateModule = new EntityStateModule(eventBus);
      const inputModule = new InputModule(eventBus);
      const rhythmModule = new RhythmModule(eventBus, manager);
      const particleModule = new ParticleModule(eventBus, manager);
      entityStateModule.init();
      inputModule.init();
      rhythmModule.init();
      particleModule.init();

      manager.initializeDefaultEntities();
      manager.start();
      window.gameManager = manager;
      window.eventBus = eventBus;
      window.entityStateModule = entityStateModule;
      window.inputModule = inputModule;
      window.rhythmModule = rhythmModule;
      window.particleModule = particleModule;

      eventBus.subscribe(GAME_EVENTS.RHYTHM_NOTE_HIT, (payload) => {
        console.log("[RHYTHM_NOTE_HIT]", payload);
      });
      eventBus.subscribe(GAME_EVENTS.RHYTHM_NOTE_MISS, (payload) => {
        console.log("[RHYTHM_NOTE_MISS]", payload);
      });

      eventBus.emit(GAME_EVENTS.RHYTHM_START, {});

      let isGalgameOpen = false;
      let overlayPagePath = "./galgame.html";
      const setGalgameOverlayVisible = (visible) => {
        isGalgameOpen = visible;
        if (visible) {
          const url = new URL(overlayPagePath, window.location.href);
          url.searchParams.set("overlay", "1");
          if (galgameFrame.src !== url.toString()) {
            galgameFrame.src = url.toString();
          }
        }
        galgameOverlay.classList.toggle("visible", visible);
        toggleGalgameBtn.textContent = visible ? "关闭对话层" : "打开对话层";
      };

      // 关键：转发 iframe 内的键盘事件到父页面，保证 InputModule 仍能收到 keydown
      window.addEventListener("message", (event) => {
        if (event.source !== galgameFrame.contentWindow) return;
        const data = event.data;
        if (!data || data.type !== "galgame-keydown") return;
        const syntheticEvent = new KeyboardEvent("keydown", {
          key: data.key,
          code: data.code,
          repeat: Boolean(data.repeat),
          bubbles: true,
          cancelable: true
        });
        window.dispatchEvent(syntheticEvent);
      });

      toggleGalgameBtn.addEventListener("click", () => {
        setGalgameOverlayVisible(!isGalgameOpen);
      });
      openBattleBtn.addEventListener("click", () => {
        window.setOverlayPage("./rpg-battle.html");
        setGalgameOverlayVisible(true);
      });

      window.addEventListener("keydown", (event) => {
        if (event.code === "F2") {
          event.preventDefault();
          setGalgameOverlayVisible(!isGalgameOpen);
        }
      });

      window.setGalgameOverlayVisible = setGalgameOverlayVisible;
      window.setOverlayPage = (path) => {
        if (typeof path !== "string" || !path.trim()) return;
        overlayPagePath = path.trim();
        if (isGalgameOpen) {
          setGalgameOverlayVisible(true);
        }
      };

      window.addEventListener("resize", () => {
        engine.resize();
        syncOrtho();
      });
    </script>
  </body>
</html>
