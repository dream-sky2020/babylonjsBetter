<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>战斗拼点模拟器 - 调试版</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #eef2f3; padding: 20px; }
        .container { display: flex; gap: 20px; justify-content: center; }
        .panel { 
            background: white; 
            padding: 20px; 
            border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
            width: 45%;  /* 使用百分比，更灵活 */
            min-width: 350px;  /* 设置最小宽度保证可读性 */
        }
        .input-group { margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        input { width: 60px; padding: 5px; border: 1px solid #ccc; border-radius: 4px; }
        .dice-group { margin-top: 12px; }
        .dice-title { margin-bottom: 8px; font-weight: 600; color: #333; }
        .dice-list { display: flex; flex-direction: column; gap: 8px; }
        .die-item {
            display: flex;
            align-items: center;
            gap: 6px;
            background: #fafafa;
            border: 1px solid #ddd;
            border-radius: 6px;
            padding: 8px;
        }
        .type-options { display: flex; gap: 4px; margin-right: 4px; }
        .type-options label {
            font-size: 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            padding: 2px 6px;
            background: #fff;
            cursor: pointer;
        }
        .die-item input[type="number"] { width: 56px; }
        .die-effect {
            flex: 1;
            min-width: 70px;
            font-size: 12px;
            padding: 5px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        .remove-die {
            width: auto;
            margin-top: 0;
            padding: 6px 8px;
            background: #dc3545;
            font-size: 12px;
        }
        .add-die {
            margin-top: 8px;
            padding: 8px;
            background: #f7f7f7;
            color: #333;
            border: 1px dashed #999;
            font-size: 13px;
        }
        .add-die:hover { background: #ececec; }
        button { width: 100%; padding: 12px; margin-top: 15px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 6px; font-weight: bold; }
        button:hover { background: #0056b3; }
        .log { margin: 20px auto; width: 660px; height: 180px; overflow-y: auto; background: #222; color: #0f0; padding: 15px; border-radius: 8px; font-family: 'Courier New', monospace; font-size: 14px; }
    </style>
</head>
<body>

<h2 style="text-align: center;">战斗逻辑调试模拟器</h2>

<div class="container">
    <!-- 单位 A -->
    <div class="panel" id="unitA">
        <h3>单位 A</h3>
        <div class="input-group">血量: <input type="number" id="hpA" value="100"></div>
        <div class="input-group">护盾: <input type="number" id="shdA" value="20"></div>
        <div class="input-group">临时护盾: <input type="number" id="tempShdA" value="0"></div>
        <div class="input-group">理智: <input type="number" id="sanA" value="45"></div>
        <div class="dice-group">
            <div class="dice-title">硬币面板</div>
            <div class="dice-list" id="dice-list-A"></div>
            <button type="button" class="add-die" id="add-die-btn-A">+ 添加一个动作(硬币)</button>
        </div>
    </div>

    <!-- 单位 B -->
    <div class="panel" id="unitB">
        <h3>单位 B</h3>
        <div class="input-group">血量: <input type="number" id="hpB" value="100"></div>
        <div class="input-group">护盾: <input type="number" id="shdB" value="0"></div>
        <div class="input-group">临时护盾: <input type="number" id="tempShdB" value="0"></div>
        <div class="input-group">理智: <input type="number" id="sanB" value="45"></div>
        <div class="dice-group">
            <div class="dice-title">硬币面板</div>
            <div class="dice-list" id="dice-list-B"></div>
            <button type="button" class="add-die" id="add-die-btn-B">+ 添加一个动作(硬币)</button>
        </div>
    </div>
</div>

<div style="text-align: center;">
    <button onclick="startClash()" style="width: 200px; background: #28a745;">开启拼点</button>
</div>

<div class="log" id="gameLog">系统就绪，等待指令...</div>

<script>
    const DICE_TYPES = [
        { id: 'slash', label: '斩' },
        { id: 'pierce', label: '刺' },
        { id: 'blunt', label: '打' }
    ];

    function log(msg) {
        const l = document.getElementById('gameLog');
        l.innerHTML += `<div>> ${msg}</div>`;
        l.scrollTop = l.scrollHeight;
    }

    function getVal(id) { return parseInt(document.getElementById(id).value); }
    function setVal(id, val) { document.getElementById(id).value = val; }

    function createDieInput(data = {}) {
        const div = document.createElement('div');
        div.className = 'die-item';

        const typeOptions = DICE_TYPES.map(t => `
            <label><input type="checkbox" class="die-type" value="${t.id}"> ${t.label}</label>
        `).join('');

        div.innerHTML = `
            <div class="type-options">${typeOptions}</div>
            <input type="number" class="die-min" value="${data.min ?? 0}" placeholder="最小">
            ~
            <input type="number" class="die-max" value="${data.max ?? 0}" placeholder="最大">
            <input type="text" class="die-effect" value="${data.effect ?? ''}" placeholder="效果">
            <button type="button" class="remove-die">删</button>
        `;

        if (data.type) {
            const types = Array.isArray(data.type) ? data.type : [data.type];
            types.forEach(t => {
                const checkbox = div.querySelector(`input[value="${t}"]`);
                if (checkbox) checkbox.checked = true;
            });
        }

        div.querySelector('.remove-die').addEventListener('click', () => {
            const parentList = div.parentElement;
            if (!parentList) return;
            if (parentList.children.length <= 1) {
                log('至少保留 1 个硬币动作');
                return;
            }
            div.remove();
        });

        return div;
    }

    function buildDiceConfig(unitId) {
        const list = document.getElementById(`dice-list-${unitId}`);
        if (!list) return [];

        return Array.from(list.querySelectorAll('.die-item')).map(item => ({
            type: Array.from(item.querySelectorAll('.die-type:checked')).map(cb => cb.value),
            min: parseInt(item.querySelector('.die-min').value) || 0,
            max: parseInt(item.querySelector('.die-max').value) || 0,
            effect: item.querySelector('.die-effect').value || ''
        }));
    }

    function rollFromDice(unitId) {
    const dice = buildDiceConfig(unitId).filter(d => Number.isFinite(d.min) && Number.isFinite(d.max));
    if (dice.length === 0) return null;

        // 遍历所有硬币，投掷一遍，保存全部结果
        const results = dice.map(die => {
            const low = Math.min(die.min, die.max);
            const high = Math.max(die.min, die.max);
            const roll = Math.floor(Math.random() * (high - low + 1)) + low;
            return {
                die: die,
                roll: roll
            };
        });

        return results;
    }

    function setupDicePanel(unitId, defaults) {
        const list = document.getElementById(`dice-list-${unitId}`);
        const addBtn = document.getElementById(`add-die-btn-${unitId}`);
        defaults.forEach(d => list.appendChild(createDieInput(d)));
        addBtn.addEventListener('click', () => {
            list.appendChild(createDieInput({ type: 'slash', min: 0, max: 0, effect: '' }));
        });
    }

    function startClash() {
        // 获取当前界面所有数值
        const A = { hp: getVal('hpA'), shd: getVal('shdA'), tempShd: getVal('tempShdA') };
        const B = { hp: getVal('hpB'), shd: getVal('shdB'), tempShd: getVal('tempShdB') };

        const resultA = rollFromDice('A');
        const resultB = rollFromDice('B');
        if (!resultA || !resultB) {
            log('拼点失败：A 或 B 的硬币配置为空');
            return;
        }

        // 记录所有投掷结果
        log(`A 投掷了 ${resultA.length} 个硬币:`);
        resultA.forEach((r, i) => {
            log(`  #${i+1}: ${r.die.min}~${r.die.max}${r.die.effect ? ` | ${r.die.effect}` : ''} → ${r.roll}`);
        });
        log(`B 投掷了 ${resultB.length} 个硬币:`);
        resultB.forEach((r, i) => {
            log(`  #${i+1}: ${r.die.min}~${r.die.max}${r.die.effect ? ` | ${r.die.effect}` : ''} → ${r.roll}`);
        });

        // 计算所有硬币的点数之和
        const sumRollA = resultA.reduce((sum, r) => sum + r.roll, 0);
        const sumRollB = resultB.reduce((sum, r) => sum + r.roll, 0);

        // 显示每个硬币的详细投掷结果
        log(`A 全部硬币点数: ${resultA.map(r => r.roll).join(' + ')} = ${sumRollA}`);
        log(`B 全部硬币点数: ${resultB.map(r => r.roll).join(' + ')} = ${sumRollB}`);
        log(`拼点: A(${sumRollA}) vs B(${sumRollB})`);

        if (sumRollA > sumRollB) {
            log(`A 胜出`);
            applyDamage('B', resultA);
        } else if (sumRollB > sumRollA) {
            log(`B 胜出`);
            applyDamage('A', resultB);
        } else {
            log("平局！硬币抵消");
        }
    }

    function applyDamage(targetId, results) {
    let hp = getVal('hp' + targetId);
    let shd = getVal('shd' + targetId);
    let tempShd = getVal('tempShd' + targetId);

    // 计算所有硬币的总伤害
    const totalDamage = results.reduce((sum, r) => sum + r.roll, 0);
    log(`${targetId} 受到总计 ${totalDamage} 点伤害（${results.map(r => r.roll).join(' + ')}）`);

    let remainingDamage = totalDamage;

    // 1. 先扣除临时护盾
    if (tempShd >= remainingDamage) {
        setVal('tempShd' + targetId, tempShd - remainingDamage);
        log(`${targetId} 的临时护盾吸收了全部 ${remainingDamage} 点伤害`);
        return;
    } else if (tempShd > 0) {
        remainingDamage -= tempShd;
        setVal('tempShd' + targetId, 0);
        log(`${targetId} 的临时护盾吸收了 ${tempShd} 点伤害，剩余 ${remainingDamage} 点伤害`);
    }

    // 2. 再扣除常规护盾
    if (shd >= remainingDamage) {
        setVal('shd' + targetId, shd - remainingDamage);
        log(`${targetId} 的常规护盾吸收了剩余 ${remainingDamage} 点伤害`);
    } else if (shd > 0) {
        remainingDamage -= shd;
        setVal('shd' + targetId, 0);
        log(`${targetId} 的常规护盾吸收了 ${shd} 点伤害，剩余 ${remainingDamage} 点真实伤害`);
        // 3. 扣除血量
        setVal('hp' + targetId, Math.max(0, hp - remainingDamage));
        log(`${targetId} 受到 ${remainingDamage} 点真实伤害，血量剩余 ${Math.max(0, hp - remainingDamage)}`);
    } else {
        // 没有护盾，直接扣除血量
        setVal('hp' + targetId, Math.max(0, hp - remainingDamage));
        log(`${targetId} 受到 ${remainingDamage} 点真实伤害，血量剩余 ${Math.max(0, hp - remainingDamage)}`);
    }
}
    setupDicePanel('A', [{ type: 'slash', min: 4, max: 8, effect: '' }]);
    setupDicePanel('B', [{ type: 'slash', min: 3, max: 10, effect: '' }]);
</script>
</body>
</html>
