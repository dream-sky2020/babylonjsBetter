<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>战斗拼点模拟器 - 调试版</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #eef2f3; padding: 20px; }
        .container { display: flex; gap: 20px; justify-content: center; }
        .panel { 
            background: white; 
            padding: 20px; 
            border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
            width: 45%;  /* 使用百分比，更灵活 */
            min-width: 350px;  /* 设置最小宽度保证可读性 */
        }
        .input-group { margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        input { width: 60px; padding: 5px; border: 1px solid #ccc; border-radius: 4px; }
        .dice-group { margin-top: 12px; }
        .dice-title { margin-bottom: 8px; font-weight: 600; color: #333; }
        .dice-list { display: flex; flex-direction: column; gap: 8px; }
        .die-item {
            display: flex;
            align-items: center;
            gap: 6px;
            background: #fafafa;
            border: 1px solid #ddd;
            border-radius: 6px;
            padding: 8px;
        }
        .type-options { display: flex; gap: 4px; margin-right: 4px; }
        .type-options label {
            font-size: 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            padding: 2px 6px;
            background: #fff;
            cursor: pointer;
        }
        .die-item input[type="number"] { width: 56px; }
        .die-effect {
            flex: 1;
            min-width: 70px;
            font-size: 12px;
            padding: 5px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        .remove-die {
            width: auto;
            margin-top: 0;
            padding: 6px 8px;
            background: #dc3545;
            font-size: 12px;
        }
        .add-die {
            margin-top: 8px;
            padding: 8px;
            background: #f7f7f7;
            color: #333;
            border: 1px dashed #999;
            font-size: 13px;
        }
        .add-die:hover { background: #ececec; }
        .status-group { margin-top: 12px; }
        .status-title { margin-bottom: 8px; font-weight: 600; color: #333; }
        .status-list { display: flex; flex-direction: column; gap: 8px; }
        .status-item {
            display: flex;
            align-items: center;
            gap: 6px;
            background: #f8fbff;
            border: 1px solid #d8e8ff;
            border-radius: 6px;
            padding: 8px;
        }
        .status-type {
            min-width: 90px;
            padding: 5px;
            border: 1px solid #ccc;
            border-radius: 4px;
            background: #fff;
        }
        .status-item input[type="number"] { width: 62px; }
        .remove-status {
            width: auto;
            margin-top: 0;
            padding: 6px 8px;
            background: #dc3545;
            font-size: 12px;
        }
        .add-status {
            margin-top: 8px;
            padding: 8px;
            background: #f7f7f7;
            color: #333;
            border: 1px dashed #999;
            font-size: 13px;
        }
        .add-status:hover { background: #ececec; }
        button { width: 100%; padding: 12px; margin-top: 15px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 6px; font-weight: bold; }
        button:hover { background: #0056b3; }
        .log { margin: 20px auto; width: 660px; height: 180px; overflow-y: auto; background: #222; color: #0f0; padding: 15px; border-radius: 8px; font-family: 'Courier New', monospace; font-size: 14px; }
    </style>
</head>
<body>

<h2 style="text-align: center;">战斗逻辑调试模拟器</h2>

<div class="container">
    <!-- 单位 A -->
    <div class="panel" id="unitA">
        <h3>单位 A</h3>
        <div class="input-group">血量: <input type="number" id="hpA" value="250"></div>
        <div class="input-group">护盾: <input type="number" id="shdA" value="20"></div>
        <div class="input-group">临时护盾: <input type="number" id="tempShdA" value="0"></div>
        <div class="input-group">理智: <input type="number" id="sanA" value="45"></div>
        <div class="input-group">混乱值: <input type="number" id="chaosA" value="0"></div>
        <div class="input-group">混乱阈值: <input type="number" id="chaosThresholdA" value="100"></div>
        <div class="dice-group">
            <div class="dice-title">骰子面板</div>
            <div class="dice-list" id="dice-list-A"></div>
            <button type="button" class="add-die" id="add-die-btn-A">+ 添加一个动作(骰子)</button>
        </div>
        <div class="status-group">
            <div class="status-title">特殊状态列表</div>
            <div class="status-list" id="status-list-A"></div>
            <button type="button" class="add-status" id="add-status-btn-A">+ 添加一个特殊状态</button>
        </div>
        <div style="margin-top: 15px; border-top: 1px dashed #ccc; padding-top: 10px;">
            <span style="font-weight:600; color: #2c3e50;">技能效果列表</span>
            <div id="skill-effect-list-A" style="margin-top:5px; display: flex; flex-direction: column; gap: 5px;">
                </div>
            <button id="add-skill-effect-A" style="margin-top: 5px; background-color: #34495e; color: white;">+ 添加技能效果</button>
        </div>
    </div>

    <!-- 单位 B -->
    <div class="panel" id="unitB">
        <h3>单位 B</h3>
        <div class="input-group">血量: <input type="number" id="hpB" value="200"></div>
        <div class="input-group">护盾: <input type="number" id="shdB" value="10"></div>
        <div class="input-group">临时护盾: <input type="number" id="tempShdB" value="0"></div>
        <div class="input-group">理智: <input type="number" id="sanB" value="45"></div>
        <div class="input-group">混乱值: <input type="number" id="chaosB" value="0"></div>
        <div class="input-group">混乱阈值: <input type="number" id="chaosThresholdB" value="70"></div>
        <div class="dice-group">
            <div class="dice-title">骰子面板</div>
            <div class="dice-list" id="dice-list-B"></div>
            <button type="button" class="add-die" id="add-die-btn-B">+ 添加一个动作(骰子)</button>
        </div>
        <div class="status-group">
            <div class="status-title">特殊状态列表</div>
            <div class="status-list" id="status-list-B"></div>
            <button type="button" class="add-status" id="add-status-btn-B">+ 添加一个特殊状态</button>
        </div>
        <div style="margin-top: 15px; border-top: 1px dashed #ccc; padding-top: 10px;">
            <span style="font-weight:600; color: #2c3e50;">技能效果列表</span>
            <div id="skill-effect-list-B" style="margin-top:5px; display: flex; flex-direction: column; gap: 5px;">
                </div>
            <button id="add-skill-effect-B" style="margin-top: 5px; background-color: #34495e; color: white;">+ 添加技能效果</button>
        </div>
    </div>
</div>

<div style="text-align: center; display: flex; justify-content: center; gap: 20px;">
    <button onclick="endTurn()" style="width: 200px; background: #fd7e14;">回合结束</button>
    <button onclick="startClash()" style="width: 200px; background: #28a745;">开启拼点</button>
</div>
<div class="log" id="gameLog">系统就绪，等待指令...</div>
<script type="module" src="./main.ts"></script>
</body>
</html>
