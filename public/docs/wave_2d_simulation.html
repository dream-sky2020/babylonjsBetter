<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2D 轮廓边缘声波传导（自动平复）</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background-color: #080d1a;
      color: #e2e8f0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
      display: flex;
    }

    /* 侧边栏控制面板 */
    #sidebar {
      width: 320px;
      height: 100vh;
      background: rgba(15, 23, 42, 0.85);
      backdrop-filter: blur(12px);
      border-right: 1px solid rgba(255, 255, 255, 0.1);
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      z-index: 10;
      box-shadow: 4px 0 24px rgba(0, 0, 0, 0.5);
      overflow-y: auto;
    }

    #sidebar h2 {
      font-size: 1.2rem;
      color: #38bdf8;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .control-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .control-group label {
      font-size: 0.85rem;
      color: #94a3b8;
      display: flex;
      justify-content: space-between;
    }

    .control-group label span.val {
      color: #38bdf8;
      font-family: monospace;
      font-weight: bold;
    }

    input[type="range"] {
      -webkit-appearance: none;
      width: 100%;
      height: 6px;
      border-radius: 3px;
      background: #1e293b;
      outline: none;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #38bdf8;
      cursor: pointer;
    }

    select {
      background: #1e293b;
      color: #f8fafc;
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 8px;
      border-radius: 6px;
      outline: none;
      cursor: pointer;
    }

    .tips {
      font-size: 0.8rem;
      color: #64748b;
      line-height: 1.4;
      background: rgba(0, 0, 0, 0.2);
      padding: 10px;
      border-radius: 6px;
      border-left: 3px solid #38bdf8;
    }

    /* 画布区域 */
    #canvas-container {
      flex: 1;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    canvas {
      display: block;
      cursor: crosshair;
    }
  </style>
</head>
<body>

  <div id="sidebar">
    <h2>2D 边缘波形控制</h2>

    <div class="control-group">
      <label>选择 2D 图形</label>
      <select id="shapeType">
        <option value="square">正方形 (Square)</option>
        <option value="rectangle">长方形 (Rectangle)</option>
        <option value="circle">圆形 (Circle)</option>
        <option value="polygon">多边形 / 六边形 (Polygon)</option>
        <option value="star">五角星 (Star)</option>
      </select>
    </div>

    <div class="control-group">
      <label>线条色彩</label>
      <select id="colorTheme">
        <option value="#38bdf8">荧光青蓝 (Neon Blue)</option>
        <option value="#00ff41">示波器绿 (CRT Green)</option>
        <option value="#ff007f">霓虹粉 (Neon Pink)</option>
        <option value="#fbbf24">琥珀金 (Amber)</option>
      </select>
    </div>

    <hr style="border:0; border-top: 1px solid rgba(255,255,255,0.1);">

    <div class="control-group">
      <label>平复消失速度 (阻尼): <span class="val" id="dampingVal">0.90</span></label>
      <input type="range" id="damping" min="0.75" max="0.97" value="0.90" step="0.01">
    </div>

    <div class="control-group">
      <label>复原拉力 (回归系数): <span class="val" id="tensionVal">0.08</span></label>
      <input type="range" id="tension" min="0.01" max="0.25" value="0.08" step="0.01">
    </div>

    <div class="control-group">
      <label>边缘波扩散速度: <span class="val" id="waveSpeedVal">0.25</span></label>
      <input type="range" id="waveSpeed" min="0.05" max="0.45" value="0.25" step="0.01">
    </div>

    <div class="control-group">
      <label>鼠标悬停抖动: <span class="val" id="hoverForceVal">8</span></label>
      <input type="range" id="hoverForce" min="0" max="30" value="8" step="1">
    </div>

    <div class="control-group">
      <label>点击波峰能量: <span class="val" id="clickForceVal">120</span></label>
      <input type="range" id="clickForce" min="20" max="300" value="120" step="10">
    </div>

    <div class="tips">
      💡 <b>平复原理：</b><br>
      • <b>平复速度 (阻尼)</b> 越小，震荡能量被吸收得越快。<br>
      • <b>复原拉力</b> 越大，边缘线恢复成标准图形的速度就越快。<br>
      • 点击图形任意边缘，巨大波峰扩散一圈后，会<b>迅速且平滑地回归原状</b>！
    </div>
  </div>

  <div id="canvas-container">
    <canvas id="canvas"></canvas>
  </div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    // UI 控件
    const shapeTypeSelect = document.getElementById('shapeType');
    const colorThemeSelect = document.getElementById('colorTheme');
    const dampingInput = document.getElementById('damping');
    const tensionInput = document.getElementById('tension');
    const waveSpeedInput = document.getElementById('waveSpeed');
    const hoverForceInput = document.getElementById('hoverForce');
    const clickForceInput = document.getElementById('clickForce');

    let points = [];
    const N = 240; // 边缘节点的数量
    let width, height, centerX, centerY;

    const mouse = { x: -1000, y: -1000 };

    function resize() {
      const container = document.getElementById('canvas-container');
      width = canvas.width = container.clientWidth;
      height = canvas.height = container.clientHeight;
      centerX = width / 2;
      centerY = height / 2;
      generateShape();
    }

    // 根据选择生成 2D 形状的基础轮廓点
    function generateShape() {
      points = [];
      const type = shapeTypeSelect.value;
      const size = Math.min(width, height) * 0.22;

      for (let i = 0; i < N; i++) {
        const t = (i / N) * Math.PI * 2;
        let bx = 0, by = 0;
        let nx = 0, ny = 0;

        if (type === 'circle') {
          bx = Math.cos(t) * size;
          by = Math.sin(t) * size;
          nx = Math.cos(t);
          ny = Math.sin(t);
        } else if (type === 'square' || type === 'rectangle') {
          const w = size * (type === 'rectangle' ? 1.4 : 1);
          const h = size * (type === 'rectangle' ? 0.8 : 1);
          const p = i / N;
          if (p < 0.25) {
            const sub = p / 0.25;
            bx = -w + sub * 2 * w; by = -h; nx = 0; ny = -1;
          } else if (p < 0.5) {
            const sub = (p - 0.25) / 0.25;
            bx = w; by = -h + sub * 2 * h; nx = 1; ny = 0;
          } else if (p < 0.75) {
            const sub = (p - 0.5) / 0.25;
            bx = w - sub * 2 * w; by = h; nx = 0; ny = 1;
          } else {
            const sub = (p - 0.75) / 0.25;
            bx = -w; by = h - sub * 2 * h; nx = -1; ny = 0;
          }
        } else if (type === 'polygon') { // 六边形
          const sides = 6;
          const angleStep = (Math.PI * 2) / sides;
          const sideIndex = Math.floor(t / angleStep);
          const a1 = sideIndex * angleStep;
          const a2 = (sideIndex + 1) * angleStep;
          const ratio = (t - a1) / angleStep;

          const x1 = Math.cos(a1) * size, y1 = Math.sin(a1) * size;
          const x2 = Math.cos(a2) * size, y2 = Math.sin(a2) * size;
          bx = x1 + (x2 - x1) * ratio;
          by = y1 + (y2 - y1) * ratio;

          const len = Math.hypot(bx, by);
          nx = bx / len; ny = by / len;
        } else if (type === 'star') { // 五角星
          const rOuter = size;
          const rInner = size * 0.45;
          const pts = 10;
          const sideIndex = Math.floor(t / ((Math.PI * 2) / pts));
          const a1 = sideIndex * ((Math.PI * 2) / pts);
          const a2 = (sideIndex + 1) * ((Math.PI * 2) / pts);
          const r1 = sideIndex % 2 === 0 ? rOuter : rInner;
          const r2 = sideIndex % 2 === 0 ? rInner : rOuter;
          const ratio = (t - a1) / ((Math.PI * 2) / pts);

          bx = (r1 * Math.cos(a1)) + ((r2 * Math.cos(a2)) - (r1 * Math.cos(a1))) * ratio;
          by = (r1 * Math.sin(a1)) + ((r2 * Math.sin(a2)) - (r1 * Math.sin(a1))) * ratio;

          const len = Math.hypot(bx, by);
          nx = bx / len; ny = by / len;
        }

        points.push({
          baseX: bx, baseY: by,
          offset: 0,
          v: 0,
          nx: nx, ny: ny
        });
      }
    }

    // 物理计算：阻尼 + 复原弹力（确保能够回归原状）
    function updatePhysics() {
      const c = parseFloat(waveSpeedInput.value);
      const damping = parseFloat(dampingInput.value);
      const tension = parseFloat(tensionInput.value);
      const hoverForce = parseFloat(hoverForceInput.value);

      // 1. 鼠标靠近时的抖动
      for (let i = 0; i < N; i++) {
        const pt = points[i];
        const worldX = centerX + pt.baseX + pt.nx * pt.offset;
        const worldY = centerY + pt.baseY + pt.ny * pt.offset;

        const dist = Math.hypot(worldX - mouse.x, worldY - mouse.y);

        if (dist < 70 && hoverForce > 0) {
          const power = (1 - dist / 70) * hoverForce;
          pt.v += (Math.random() - 0.5) * power;
        }
      }

      // 2. 波动方程 + 回归弹力 + 阻尼
      for (let i = 0; i < N; i++) {
        const left = points[(i - 1 + N) % N].offset;
        const right = points[(i + 1) % N].offset;
        const curr = points[i].offset;

        // 邻居节点的牵引力（波的扩散）
        const waveForce = (left + right - 2 * curr) * c;
        // 拉回基准位置的原状拉力（弹簧模型）
        const springForce = -curr * tension;

        // 累加加速度
        points[i].v += waveForce + springForce;
        // 施加阻尼衰减
        points[i].v *= damping;
      }

      // 更新位置
      for (let i = 0; i < N; i++) {
        points[i].offset += points[i].v;
      }
    }

    // 绘制边缘
    function draw() {
      ctx.clearRect(0, 0, width, height);

      const color = colorThemeSelect.value;
      ctx.strokeStyle = color;
      ctx.lineWidth = 3;
      ctx.shadowBlur = 12;
      ctx.shadowColor = color;

      ctx.beginPath();
      for (let i = 0; i < N; i++) {
        const pt = points[i];
        const x = centerX + pt.baseX + pt.nx * pt.offset;
        const y = centerY + pt.baseY + pt.ny * pt.offset;

        if (i === 0) {
          ctx.moveTo(x, y);
        } else {
          ctx.lineTo(x, y);
        }
      }
      ctx.closePath();
      ctx.stroke();
    }

    // 点击事件：注入局部能量波峰
    window.addEventListener('click', (e) => {
      let closestIdx = -1;
      let minDist = Infinity;
      const clickForce = parseFloat(clickForceInput.value);

      for (let i = 0; i < N; i++) {
        const pt = points[i];
        const worldX = centerX + pt.baseX;
        const worldY = centerY + pt.baseY;
        const dist = Math.hypot(worldX - e.clientX, worldY - e.clientY);
        if (dist < minDist) {
          minDist = dist;
          closestIdx = i;
        }
      }

      // 如果点击在图形附近，注入向外/向内的波峰脉冲
      if (closestIdx !== -1 && minDist < 250) {
        const range = Math.floor(N * 0.08);
        for (let r = -range; r <= range; r++) {
          const idx = (closestIdx + r + N) % N;
          const factor = Math.cos((r / range) * (Math.PI / 2));
          points[idx].v += clickForce * factor;
        }
      }
    });

    window.addEventListener('mousemove', (e) => {
      mouse.x = e.clientX;
      mouse.y = e.clientY;
    });

    window.addEventListener('resize', resize);
    shapeTypeSelect.addEventListener('change', generateShape);

    dampingInput.addEventListener('input', (e) => {
      document.getElementById('dampingVal').textContent = parseFloat(e.target.value).toFixed(2);
    });
    tensionInput.addEventListener('input', (e) => {
      document.getElementById('tensionVal').textContent = parseFloat(e.target.value).toFixed(2);
    });
    waveSpeedInput.addEventListener('input', (e) => {
      document.getElementById('waveSpeedVal').textContent = parseFloat(e.target.value).toFixed(2);
    });
    hoverForceInput.addEventListener('input', (e) => {
      document.getElementById('hoverForceVal').textContent = e.target.value;
    });
    clickForceInput.addEventListener('input', (e) => {
      document.getElementById('clickForceVal').textContent = e.target.value;
    });

    function loop() {
      updatePhysics();
      draw();
      requestAnimationFrame(loop);
    }

    resize();
    loop();
  </script>
</body>
</html>
