<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Galgame UI 模拟器</title>
    <style>
        /* 基础样式重置与全屏设置 */
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
        body, html { width: 100%; height: 100%; overflow: hidden; background-color: #f0f0f0; font-family: "Microsoft YaHei", sans-serif; }

        /* 游戏主容器 */
        #game-container { position: relative; width: 100%; height: 100%; background: url('https://images.unsplash.com/photo-1518709268805-4e9042af9f23?q=80&w=1920&auto=format&fit=crop') no-repeat center center/cover; }

        /* 立绘占位区（用渐变色模拟一个人形轮廓） */
        #sprite { position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); width: 400px; height: 600px; background: linear-gradient(to top, rgba(50,50,50,0.9), rgba(150,150,150,0.2)); border-radius: 200px 200px 0 0; border: 2px solid rgba(255,255,255,0.5); border-bottom: none; }

        /* UI 总图层 */
        #ui-layer { position: absolute; width: 100%; height: 100%; transition: opacity 0.3s ease; }
        .hidden #ui-layer { opacity: 0; pointer-events: none; }

        /* 控制台 (右上角) */
        #custom-console { position: absolute; top: 20px; right: 20px; background: rgba(0, 0, 0, 0.7); padding: 10px; border-radius: 8px; border: 1px solid #555; display: flex; gap: 5px; }
        #custom-console input { padding: 5px; border-radius: 4px; border: none; outline: none; width: 200px; }
        #custom-console button { padding: 5px 10px; cursor: pointer; border: none; border-radius: 4px; background: #007bff; color: white; }
        #custom-console button:hover { background: #0056b3; }

        /* 对话框整体 (底部) */
        #dialogue-area { position: absolute; bottom: 30px; left: 10%; width: 80%; }
        
        /* 名字框 */
        #speaker-box { display: inline-block; background: rgba(0, 0, 0, 0.8); color: #fff; padding: 5px 20px; border-radius: 5px 5px 0 0; font-size: 20px; font-weight: bold; border: 2px solid #fff; border-bottom: none; }
        
        /* 文本框 */
        #text-box { background: rgba(0, 0, 0, 0.8); border: 2px solid #fff; border-radius: 0 10px 10px 10px; padding: 20px; color: #fff; font-size: 24px; min-height: 150px; cursor: pointer; position: relative; display: flex; flex-direction: column; justify-content: space-between; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        #text-content { flex-grow: 1; line-height: 1.5; text-shadow: 1px 1px 2px #000; }
        
        /* 底部控制按钮 */
        #controls { display: flex; justify-content: flex-end; gap: 10px; margin-top: 10px; }
        .control-btn { background: rgba(255, 255, 255, 0.2); color: #fff; border: 1px solid rgba(255, 255, 255, 0.5); padding: 5px 15px; border-radius: 15px; cursor: pointer; font-size: 14px; transition: all 0.2s; }
        .control-btn:hover { background: rgba(255, 255, 255, 0.5); }
        .control-btn.active { background: #ffaa00; color: #000; border-color: #ffaa00; }

        /* 历史文本界面 (模态框) */
        #history-modal { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); color: white; display: none; flex-direction: column; padding: 50px; z-index: 100; }
        #history-modal h2 { margin-bottom: 20px; text-align: center; }
        #history-list { flex-grow: 1; overflow-y: auto; padding-right: 20px; }
        .history-item { margin-bottom: 15px; border-bottom: 1px solid #444; padding-bottom: 10px; }
        .history-speaker { font-weight: bold; color: #ffaa00; margin-bottom: 5px; }
        #btn-close-history { align-self: center; margin-top: 20px; padding: 10px 30px; font-size: 18px; cursor: pointer; border-radius: 5px; border: none; background: #fff; color: #000; }
        
        /* 滚动条样式 */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #222; }
        ::-webkit-scrollbar-thumb { background: #666; border-radius: 4px; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="sprite"></div>

    <div id="ui-layer">
        <div id="custom-console">
            <input type="text" id="console-input" placeholder="输入你想说的话..." autocomplete="off">
            <button id="btn-send">发送台词</button>
        </div>

        <div id="dialogue-area">
            <div id="speaker-box">系统</div>
            <div id="text-box" id="text-box-click">
                <div id="text-content"></div>
                <div id="controls">
                    <button class="control-btn" id="btn-auto">自动</button>
                    <button class="control-btn" id="btn-skip">跳过</button>
                    <button class="control-btn" id="btn-speed">速度: 1x</button>
                    <button class="control-btn" id="btn-hide">隐藏</button>
                    <button class="control-btn" id="btn-history">历史</button>
                </div>
            </div>
        </div>
    </div>

    <div id="history-modal">
        <h2>过往文本 (Backlog)</h2>
        <div id="history-list"></div>
        <button id="btn-close-history">返回游戏</button>
    </div>
</div>

<script>
    // --- 数据与状态 ---
    const scriptData = [
        { speaker: "向导", text: "欢迎来到纯前端构建的 Galgame 界面。" },
        { speaker: "向导", text: "这里完美实现了你所需的所有功能。" },
        { speaker: "向导", text: "你可以点击【自动】让文本自动播放，或者【跳过】直接起飞。" },
        { speaker: "向导", text: "点击【速度】按钮可以切换打字机效果的快慢（1x、2x、3x）。" },
        { speaker: "向导", text: "如果想看立绘（虽然现在只是个占位符），可以点击【隐藏】。点击屏幕任意位置即可恢复。" },
        { speaker: "向导", text: "错过的文本可以在【历史】中查看。现在，试试右上角的控制台，给自己加戏吧！" }
    ];
    
    let currentIndex = 0;
    let isTyping = false;
    let currentText = "";
    let typeIndex = 0;
    
    // 配置状态
    let state = {
        auto: false,
        skip: false,
        speed: 1, // 1, 2, 3
        hidden: false
    };

    let historyLog = [];
    
    // 定时器引用
    let typeTimer = null;
    let autoNextTimer = null;

    // --- DOM 元素获取 ---
    const gameContainer = document.getElementById('game-container');
    const speakerBox = document.getElementById('speaker-box');
    const textContent = document.getElementById('text-content');
    const textBox = document.getElementById('text-box');
    
    const btnAuto = document.getElementById('btn-auto');
    const btnSkip = document.getElementById('btn-skip');
    const btnSpeed = document.getElementById('btn-speed');
    const btnHide = document.getElementById('btn-hide');
    const btnHistory = document.getElementById('btn-history');
    
    const historyModal = document.getElementById('history-modal');
    const historyList = document.getElementById('history-list');
    const btnCloseHistory = document.getElementById('btn-close-history');
    
    const consoleInput = document.getElementById('console-input');
    const btnSend = document.getElementById('btn-send');

    // --- 核心逻辑 ---

    // 初始化/播放下一句
    function playDialogue() {
        clearTimeout(typeTimer);
        clearTimeout(autoNextTimer);

        if (currentIndex >= scriptData.length) {
            textContent.innerHTML = "<i>（脚本已结束。请使用控制台添加新台词。）</i>";
            speakerBox.innerText = "系统";
            return;
        }

        const line = scriptData[currentIndex];
        speakerBox.innerText = line.speaker;
        currentText = line.text;
        
        // 记录历史
        addToHistory(line.speaker, line.text);

        if (state.skip) {
            // 跳过模式：瞬间完成
            finishTyping();
        } else {
            // 正常打字机模式
            textContent.innerHTML = "";
            typeIndex = 0;
            isTyping = true;
            typeWriter();
        }
    }

    // 打字机效果
    function typeWriter() {
        if (typeIndex < currentText.length) {
            textContent.innerHTML += currentText.charAt(typeIndex);
            typeIndex++;
            
            // 根据倍速计算延迟 (1x=50ms, 2x=25ms, 3x=10ms)
            let delay = 50;
            if (state.speed === 2) delay = 25;
            if (state.speed === 3) delay = 10;

            typeTimer = setTimeout(typeWriter, delay);
        } else {
            finishTyping();
        }
    }

    // 完成一行文字后的处理
    function finishTyping() {
        isTyping = false;
        textContent.innerHTML = currentText;
        
        if (state.skip) {
            // 跳过模式极速下一句
            autoNextTimer = setTimeout(advanceStory, 100);
        } else if (state.auto) {
            // 自动模式根据当前倍速等待一会儿后下一句
            let waitTime = 1500 / state.speed; 
            autoNextTimer = setTimeout(advanceStory, waitTime);
        }
    }

    // 推进故事
    function advanceStory() {
        if (isTyping) {
            // 如果正在打字，点击则瞬间显示全部文本
            clearTimeout(typeTimer);
            finishTyping();
        } else {
            // 如果已显示完，进入下一句
            if (currentIndex < scriptData.length) {
                currentIndex++;
                playDialogue();
            }
        }
    }

    // 记录历史文本
    function addToHistory(speaker, text) {
        historyLog.push({ speaker, text });
        const div = document.createElement('div');
        div.className = 'history-item';
        div.innerHTML = `<div class="history-speaker">${speaker}</div><div>${text}</div>`;
        historyList.appendChild(div);
    }

    // --- 事件监听 ---

    // 1. 点击屏幕/对话框进行交互
    gameContainer.addEventListener('click', (e) => {
        // 如果是从隐藏状态恢复
        if (state.hidden) {
            state.hidden = false;
            gameContainer.classList.remove('hidden');
            return;
        }
        
        // 如果点击的是控制按钮或控制台，不推进故事
        if (e.target.closest('#controls') || e.target.closest('#custom-console') || e.target.closest('#history-modal')) {
            return;
        }

        // 手动干预时关闭跳过和自动
        if (state.skip) { state.skip = false; btnSkip.classList.remove('active'); }
        if (state.auto) { state.auto = false; btnAuto.classList.remove('active'); clearTimeout(autoNextTimer); }
        
        advanceStory();
    });

    // 2. 自动按钮
    btnAuto.addEventListener('click', () => {
        state.auto = !state.auto;
        btnAuto.classList.toggle('active', state.auto);
        if (state.auto && state.skip) {
            state.skip = false;
            btnSkip.classList.remove('active');
        }
        if (state.auto && !isTyping) advanceStory();
    });

    // 3. 跳过按钮
    btnSkip.addEventListener('click', () => {
        state.skip = !state.skip;
        btnSkip.classList.toggle('active', state.skip);
        if (state.skip && state.auto) {
            state.auto = false;
            btnAuto.classList.remove('active');
        }
        if (state.skip && !isTyping) advanceStory();
        else if (state.skip && isTyping) finishTyping();
    });

    // 4. 倍速按钮
    btnSpeed.addEventListener('click', () => {
        state.speed = state.speed >= 3 ? 1 : state.speed + 1;
        btnSpeed.innerText = `速度: ${state.speed}x`;
    });

    // 5. 隐藏按钮
    btnHide.addEventListener('click', () => {
        state.hidden = true;
        gameContainer.classList.add('hidden');
    });

    // 6. 历史记录
    btnHistory.addEventListener('click', () => {
        historyModal.style.display = 'flex';
        historyList.scrollTop = historyList.scrollHeight; // 滚动到底部
    });
    btnCloseHistory.addEventListener('click', () => {
        historyModal.style.display = 'none';
    });

    // 7. 控制台功能 (添加台词)
    btnSend.addEventListener('click', () => {
        const text = consoleInput.value.trim();
        if (text) {
            scriptData.push({ speaker: "玩家", text: text });
            consoleInput.value = '';
            // 如果脚本处于结束状态，立刻播放新加的这句
            if (currentIndex >= scriptData.length - 1 && !isTyping && document.getElementById('text-content').innerText.includes('脚本已结束')) {
               currentIndex = scriptData.length - 1;
               playDialogue();
            }
        }
    });
    consoleInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') btnSend.click();
    });

    // 启动游戏
    playDialogue();

</script>
</body>
</html>
