<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canvas 伪 3D 棋盘</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }
        .controls {
            margin-bottom: 20px;
            background: #1e1e24;
            padding: 15px 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            display: flex;
            gap: 20px;
        }
        .control-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        input[type="number"] {
            width: 60px;
            padding: 5px;
            border: 1px solid #444;
            border-radius: 4px;
            background: #2a2a35;
            color: white;
            text-align: center;
        }
        canvas {
            background-color: #1e1e24;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid #333;
        }
    </style>
</head>
<body>

    <div class="controls">
        <div class="control-group">
            <label for="cols">X (列数):</label>
            <input type="number" id="cols" min="1" max="12" value="8">
        </div>
        <div class="control-group">
            <label for="rows">Y (行数):</label>
            <input type="number" id="rows" min="1" max="12" value="8">
        </div>
    </div>

    <canvas id="board" width="900" height="600"></canvas>

    <script>
        const canvas = document.getElementById('board');
        const ctx = canvas.getContext('2d');
        const inputCols = document.getElementById('cols');
        const inputRows = document.getElementById('rows');

        // 监听输入变化，实时重绘
        inputCols.addEventListener('input', updateBoard);
        inputRows.addEventListener('input', updateBoard);

        function updateBoard() {
            let cols = parseInt(inputCols.value);
            let rows = parseInt(inputRows.value);

            // 严格限制最大值为 12，最小值为 1
            if (cols < 1) cols = 1; if (cols > 12) cols = 12;
            if (rows < 1) rows = 1; if (rows > 12) rows = 12;

            drawBoard(cols, rows);
        }

        // 核心投影算法：将 3D 坐标转换为屏幕 2D 坐标
        function project(x3d, y3d, z3d, fov, camera, horizonY) {
            // 计算物体相对于相机的 Z 轴深度
            const zRel = z3d - camera.z;
            
            // 防止除以 0 或负数（物体在相机背后）
            if (zRel <= 0) return { x: 0, y: 0 };

            // 透视缩放比例（深度越深，比例越小，即近大远小）
            const scale = fov / zRel;

            // X 轴投影：基于画布中心向两侧扩展
            const x2d = canvas.width / 2 + (x3d - camera.x) * scale;
            
            // Y 轴投影：基于地平线（消失点）向下扩展
            // 因为我们的棋盘在相机下方 (y3d = 0, camera.y = 300)
            const y2d = horizonY + (camera.y - y3d) * scale;

            return { x: x2d, y: y2d };
        }

        function drawBoard(cols, rows) {
            // 清空画布
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 绘制地平线和背景发光效果以增强深度感
            const gradient = ctx.createLinearGradient(0, 0, 0, 200);
            gradient.addColorStop(0, '#121212');
            gradient.addColorStop(1, '#2c2c34');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, 200);

            // 3D 场景参数设置
            const tileSize = 60;        // 3D 空间中每个格子的真实尺寸
            const fov = 600;            // 视场焦距 (Field of View)
            const horizonY = 180;       // 地平线在 Canvas 上的 Y 坐标（消失点高度）
            
            // 虚拟相机位置
            const camera = { 
                x: 0,                   // 居中
                y: 300,                 // 相机高度（俯视角度）
                z: -450                 // 相机距离棋盘前边缘的距离
            };

            // 计算棋盘在 X 轴上的起始点，使其居中对齐
            const xStart = -(cols * tileSize) / 2;

            // 遍历每一行和每一列
            for (let z = 0; z < rows; z++) {
                for (let x = 0; x < cols; x++) {
                    const x3d = xStart + x * tileSize;
                    const z3d = z * tileSize;

                    // 获取当前格子四个角的 3D 坐标并进行 2D 投影
                    // 顺序：左上 -> 右上 -> 右下 -> 左下
                    const p1 = project(x3d, 0, z3d, fov, camera, horizonY);
                    const p2 = project(x3d + tileSize, 0, z3d, fov, camera, horizonY);
                    const p3 = project(x3d + tileSize, 0, z3d + tileSize, fov, camera, horizonY);
                    const p4 = project(x3d, 0, z3d + tileSize, fov, camera, horizonY);

                    // 绘制四边形
                    ctx.beginPath();
                    ctx.moveTo(p1.x, p1.y);
                    ctx.lineTo(p2.x, p2.y);
                    ctx.lineTo(p3.x, p3.y);
                    ctx.lineTo(p4.x, p4.y);
                    ctx.closePath();

                    // 棋盘格经典交替颜色
                    if ((x + z) % 2 === 0) {
                        ctx.fillStyle = '#f0f0f0'; // 亮色格
                    } else {
                        ctx.fillStyle = '#3a3a45'; // 暗色格
                    }
                    ctx.fill();

                    // 绘制格子边框
                    ctx.strokeStyle = '#111111';
                    ctx.lineWidth = 1;
                    ctx.stroke();
                }
            }
        }

        // 初始化第一次渲染
        updateBoard();
    </script>
</body>
</html>
