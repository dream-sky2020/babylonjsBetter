<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <base href="/">
    <title>UI 能量线交互 - 粒子碰撞版</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #1a1a24;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            align-items: center;
            overflow: hidden;
            font-family: sans-serif;
        }

        .row {
            display: flex;
            gap: 80px;
            z-index: 10;
        }

        .node {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: #2b2b40;
            border: 3px solid #00ffff;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.4);
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s, border-color 0.3s;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
            font-weight: bold;
            user-select: none;
            position: relative;
        }

        .node:hover {
            transform: scale(1.1);
            box-shadow: 0 0 25px rgba(0, 255, 255, 0.8);
        }

        /* 发生碰撞时的节点高亮 */
        .node.clashing {
            border-color: #ff6600;
            box-shadow: 0 0 20px rgba(255, 102, 0, 0.6);
        }

        #svg-canvas, #spark-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        #svg-canvas { z-index: 5; }
        #spark-canvas { z-index: 6; } /* 粒子画布在 SVG 之上 */

        /* 单向能量线 */
        .energy-line {
            fill: none;
            stroke: #00ffff;
            stroke-width: 3;
            filter: drop-shadow(0 0 5px #00ffff);
            stroke-dasharray: 12 6;
            animation: flow 0.5s linear infinite;
        }

        /* 互相连接时的对抗能量线 */
        .energy-line.clash {
            stroke: #ff6600;
            stroke-dasharray: none; /* 实线对抗 */
            stroke-width: 4;
            animation: pulse-glow 1s infinite alternate;
        }

        @keyframes flow {
            from { stroke-dashoffset: 18; }
            to { stroke-dashoffset: 0; }
        }

        @keyframes pulse-glow {
            from { filter: drop-shadow(0 0 5px #ff6600); }
            to { filter: drop-shadow(0 0 15px #ffaa00); stroke: #ffaa00; }
        }
    </style>
</head>
<body>

    <canvas id="spark-canvas"></canvas>

    <svg id="svg-canvas">
        <defs>
            <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
                <path d="M 0 0 L 10 5 L 0 10 z" fill="#00ffff" />
            </marker>
        </defs>
        <g id="lines-group"></g>
    </svg>

    <div class="row" id="row1">
        <div class="node" id="node-1-1">1</div>
        <div class="node" id="node-1-2">2</div>
        <div class="node" id="node-1-3">3</div>
        <div class="node" id="node-1-4">4</div>
    </div>

    <div class="row" id="row2">
        <div class="node" id="node-2-1">5</div>
        <div class="node" id="node-2-2">6</div>
        <div class="node" id="node-2-3">7</div>
        <div class="node" id="node-2-4">8</div>
    </div>

    <script>
        // --- 核心画布和状态 ---
        const svgGroup = document.getElementById('lines-group');
        const sparkCanvas = document.getElementById('spark-canvas');
        const ctx = sparkCanvas.getContext('2d');
        const nodes = document.querySelectorAll('.node');
        
        let activeNode = null;
        let mousePos = { x: 0, y: 0 };
        
        // 存储连接关系: Map<sourceId, targetId>
        const connections = new Map(); 
        
        // 存储发生对抗的中心点，供粒子系统读取
        let clashPoints = [];

        // 初始化 Canvas 尺寸
        function resizeCanvas() {
            sparkCanvas.width = window.innerWidth;
            sparkCanvas.height = window.innerHeight;
            renderAll();
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        function getCenter(el) {
            const rect = el.getBoundingClientRect();
            return { x: rect.left + rect.width / 2, y: rect.top + rect.height / 2 };
        }

        // --- 核心渲染引擎：根据数据状态绘制线条 ---
        function renderAll() {
            // 清空旧线条和节点高亮状态
            svgGroup.innerHTML = '';
            nodes.forEach(n => n.classList.remove('clashing'));
            clashPoints = [];
            
            const processedClashes = new Set(); // 记录已处理的双向奔赴

            connections.forEach((targetId, sourceId) => {
                const isClashing = connections.get(targetId) === sourceId;

                const p1 = getCenter(document.getElementById(sourceId));
                const p2 = getCenter(document.getElementById(targetId));
                const cx = (p1.x + p2.x) / 2;
                const cy = Math.min(p1.y, p2.y) - 150;

                if (isClashing) {
                    // 防止绘制两次对抗线
                    const pairKey = [sourceId, targetId].sort().join('-');
                    if (processedClashes.has(pairKey)) return;
                    processedClashes.add(pairKey);

                    // 高亮节点
                    document.getElementById(sourceId).classList.add('clashing');
                    document.getElementById(targetId).classList.add('clashing');

                    // 1. 绘制橙色对抗线条 (两点中心相连)
                    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                    path.setAttribute('class', 'energy-line clash');
                    path.setAttribute('d', `M ${p1.x} ${p1.y} Q ${cx} ${cy} ${p2.x} ${p2.y}`);
                    svgGroup.appendChild(path);

                    // 2. 计算贝塞尔曲线的中点 (t=0.5) 及其切线角度
                    const midX = cx;
                    const midY = 0.25 * p1.y + 0.5 * cy + 0.25 * p2.y;
                    const angle = Math.atan2(p2.y - p1.y, p2.x - p1.x) * 180 / Math.PI;

                    // 3. 绘制两个针锋相对的箭头
                    // 左侧箭头向右刺
                    const arrowLeft = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                    arrowLeft.setAttribute('d', 'M -18 -8 L -3 0 L -18 8 L -14 0 Z');
                    arrowLeft.setAttribute('fill', '#ffaa00');
                    arrowLeft.setAttribute('transform', `translate(${midX}, ${midY}) rotate(${angle})`);
                    svgGroup.appendChild(arrowLeft);

                    // 右侧箭头向左刺
                    const arrowRight = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                    arrowRight.setAttribute('d', 'M 18 -8 L 3 0 L 18 8 L 14 0 Z');
                    arrowRight.setAttribute('fill', '#ffaa00');
                    arrowRight.setAttribute('transform', `translate(${midX}, ${midY}) rotate(${angle})`);
                    svgGroup.appendChild(arrowRight);

                    // 4. 将碰撞点交给粒子引擎
                    clashPoints.push({ x: midX, y: midY });

                } else {
                    // 单向连接：普通的蓝色虚线
                    const offset = 35; 
                    const dx = p2.x - cx;
                    const dy = p2.y - cy;
                    const length = Math.sqrt(dx * dx + dy * dy);
                    
                    if (length > 0) {
                        const nx = dx / length;
                        const ny = dy / length;
                        const finalX = p2.x - nx * offset;
                        const finalY = p2.y - ny * offset;

                        const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                        path.setAttribute('class', 'energy-line');
                        path.setAttribute('marker-end', 'url(#arrow)');
                        path.setAttribute('d', `M ${p1.x} ${p1.y} Q ${cx} ${cy} ${finalX} ${finalY}`);
                        svgGroup.appendChild(path);
                    }
                }
            });

            // 渲染正在拖拽的临时线条
            if (activeNode) {
                const p1 = getCenter(activeNode);
                const cx = (p1.x + mousePos.x) / 2;
                const cy = Math.min(p1.y, mousePos.y) - 150;
                
                const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                path.setAttribute('class', 'energy-line');
                path.setAttribute('marker-end', 'url(#arrow)');
                path.setAttribute('d', `M ${p1.x} ${p1.y} Q ${cx} ${cy} ${mousePos.x} ${mousePos.y}`);
                svgGroup.appendChild(path);
            }
        }

        // --- 交互事件绑定 ---
        nodes.forEach(node => {
            node.addEventListener('mousedown', (e) => {
                e.stopPropagation();
                activeNode = node;
                // 如果它原来有发出的连接，先删除掉
                connections.delete(node.id);
                mousePos = { x: e.clientX, y: e.clientY };
                renderAll();
            });

            node.addEventListener('mouseup', (e) => {
                e.stopPropagation();
                if (activeNode && activeNode !== node) {
                    connections.set(activeNode.id, node.id); // 建立单向映射
                }
                activeNode = null;
                renderAll();
            });
        });

        document.addEventListener('mousemove', (e) => {
            if (activeNode) {
                mousePos = { x: e.clientX, y: e.clientY };
                renderAll();
            }
        });

        document.addEventListener('mouseup', () => {
            if (activeNode) {
                activeNode = null;
                renderAll();
            }
        });

        // --- 高性能粒子火花引擎 (Canvas) ---
        let particles = [];
        
        function updateAndDrawParticles() {
            ctx.clearRect(0, 0, sparkCanvas.width, sparkCanvas.height);

            // 在发生碰撞的地方不断生成新粒子
            clashPoints.forEach(pt => {
                // 每帧有 40% 的概率生成几个火花，营造爆裂感
                if (Math.random() < 0.4) {
                    for (let i = 0; i < 3; i++) {
                        const angle = Math.random() * Math.PI * 2; // 360度随机喷射
                        const speed = Math.random() * 4 + 1; // 喷射速度
                        particles.push({
                            x: pt.x,
                            y: pt.y,
                            vx: Math.cos(angle) * speed,
                            vy: Math.sin(angle) * speed,
                            life: 1, // 生命值
                            size: Math.random() * 3 + 1,
                            color: Math.random() > 0.5 ? '#ffaa00' : '#ffffff' // 橙色混杂白色强光
                        });
                    }
                }
            });

            // 更新并绘制所有粒子
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.life -= 0.03; // 每帧衰减

                if (p.life <= 0) {
                    particles.splice(i, 1); // 销毁死亡粒子
                    continue;
                }

                ctx.globalAlpha = p.life; // 逐渐透明
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
            }
            
            ctx.globalAlpha = 1; // 重置透明度
            requestAnimationFrame(updateAndDrawParticles); // 循环下一帧
        }

        // 启动粒子循环
        updateAndDrawParticles();

    </script>
</body>
</html>
