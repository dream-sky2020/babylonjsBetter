<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <base href="/">
    <title>边狱巴士战斗 UI - 全 Canvas 2D 重构版</title>
    <style>
        :root {
            --bg-color: #1a1a1a;
            --panel-bg: #2d2d2d;
            --text-color: #eeeeee;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            user-select: none;
            overflow: hidden;
        }

        .dashboard {
            position: relative;
            width: 90%;
            max-width: 900px;
            height: 350px;
            background-color: var(--panel-bg);
            border: 3px solid #444;
            border-radius: 10px;
            box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.8), 0 10px 30px rgba(0, 0, 0, 0.5);
            cursor: crosshair;
        }

        /* 唯一的画布承担所有渲染任务 */
        #game-canvas {
            display: block;
            width: 100%;
            height: 100%;
            border-radius: 8px;
        }

        .info-text {
            margin-top: 30px;
            font-size: 18px;
            color: #aaa;
            text-align: center;
            min-height: 54px;
        }
    </style>
</head>

<body>

    <div class="dashboard" id="dashboard">
        <canvas id="game-canvas"></canvas>
    </div>

    <div class="info-text" id="info">正在等待控制台指令初始化...</div>

    <script src="skills.js"></script>

    <script>
        // ==========================================
        // 画布与基本状态管理
        // ==========================================
        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d');
        const infoText = document.getElementById('info');

        // 复用离屏画布，专门用于实现原版复杂的图片遮罩裁剪（Mask-image）
        const offscreenCanvas = document.createElement('canvas');
        const offCtx = offscreenCanvas.getContext('2d');

        const NODE_SIZE = 64; 
        const BASE_SIZE = 128; 
        const RATIO = NODE_SIZE / BASE_SIZE; 

        let numCols = 5;
        let colRowCounts = [2, 2, 2, 2, 2];
        
        let nodes = [];       // 统一存储所有技能节点的几何与逻辑数据
        let chain = [];       // 当前已连线的节点队列
        let particles = [];   // 粒子特效阵列
        let isDragging = false;
        let currentMousePos = { x: 0, y: 0 };
        let customSkillPool = [];

        // ==========================================
        // 资源异步加载与缓存系统
        // ==========================================
        const imageCache = new Map();
        function getCachedImage(url) {
            if (!url) return null;
            if (imageCache.has(url)) return imageCache.get(url);

            const img = new Image();
            img.crossOrigin = "Anonymous";
            img.src = url;
            imageCache.set(url, img);
            return img;
        }

        // ==========================================
        // 粒子特效系统
        // ==========================================
        class Particle {
            constructor(x, y, color) {
                this.x = x; this.y = y; this.color = color;
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 5 + 2;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.life = 1.0;
                this.decay = Math.random() * 0.03 + 0.02;
                this.size = Math.random() * 4 + 2;
            }
            update() {
                this.vx *= 0.92; this.vy *= 0.92;
                this.x += this.vx; this.y += this.vy;
                this.life -= this.decay;
            }
            draw(c) {
                c.save();
                c.globalAlpha = this.life;
                c.fillStyle = this.color;
                c.shadowBlur = 10;
                c.shadowColor = this.color;
                c.beginPath();
                c.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                c.fill();
                c.restore();
            }
        }

        function triggerNodeBurst(x, y, colorHex) {
            for (let i = 0; i < 25; i++) {
                particles.push(new Particle(x, y, colorHex));
            }
        }

        // ==========================================
        // 核心战斗数据初始化
        // ==========================================
        const SIN_COLORS = [
            { name: 'Wrath (愤怒)', hex: '#e74c3c' },
            { name: 'Lust (色欲)', hex: '#e67e22' },
            { name: 'Sloth (怠惰)', hex: '#f1c40f' },
            { name: 'Gluttony (暴食)', hex: '#2ecc71' },
            { name: 'Gloom (忧郁)', hex: '#3498db' },
            { name: 'Pride (傲慢)', hex: '#11105e' },
            { name: 'Envy (嫉妒)', hex: '#9b59b6' }
        ];

        let DEFAULT_SKILLS = SIN_COLORS.map(sin => ({
            colorName: sin.name, colorHex: sin.hex, weight: 1,
            background: { previewUrl: `https://via.placeholder.com/128/${sin.hex.replace('#', '')}/${sin.hex.replace('#', '')}`, visible: true, scale: 1, offsetX: 0, offsetY: 0 },
            icon: { previewUrl: 'https://via.placeholder.com/90/FFFFFF/000000?text=Skill', visible: true, scale: 1, offsetX: 0, offsetY: 0 },
            border: { previewUrl: 'https://via.placeholder.com/128/FFFFFF/FFFFFF?text=+', visible: true, scale: 1, offsetX: 0, offsetY: 0 },
            mask: { previewUrl: '', visible: false }
        }));

        if (typeof OUTSIDE_SKILLS !== 'undefined' && Array.isArray(OUTSIDE_SKILLS) && OUTSIDE_SKILLS.length > 0) {
            DEFAULT_SKILLS = OUTSIDE_SKILLS;
        }

        function pickSkillFromPool() {
            const pool = (Array.isArray(customSkillPool) && customSkillPool.length > 0) ? customSkillPool : DEFAULT_SKILLS;
            const preparedPool = pool.filter(skill => skill && typeof skill === 'object');
            if (preparedPool.length === 0) return DEFAULT_SKILLS[0];

            const totalWeight = preparedPool.reduce((sum, skill) => {
                const weight = Number(skill.weight);
                return sum + (Number.isFinite(weight) && weight > 0 ? weight : 1);
            }, 0);

            let roll = Math.random() * totalWeight;
            for (const skill of preparedPool) {
                const weight = Number(skill.weight);
                const normalizedWeight = Number.isFinite(weight) && weight > 0 ? weight : 1;
                roll -= normalizedWeight;
                if (roll <= 0) return skill;
            }
            return preparedPool[preparedPool.length - 1];
        }

        function resizeCanvas() {
            const dashboard = document.getElementById('dashboard');
            canvas.width = dashboard.clientWidth;
            canvas.height = dashboard.clientHeight;
            recalculatePositions();
        }
        window.addEventListener('resize', resizeCanvas);

        // 统一计算各列各行节点的画布坐标中心点 (取代 Flexbox 弹性布局)
        function recalculatePositions() {
            const colWidth = canvas.width / numCols;
            nodes.forEach(node => {
                const rowsForThisCol = colRowCounts[node.col] || 1;
                const rowHeight = canvas.height / rowsForThisCol;
                node.x = colWidth * node.col + colWidth / 2;
                node.y = rowHeight * node.row + rowHeight / 2;
            });
        }

        function initBoard() {
            nodes = []; chain = []; particles = []; isDragging = false;
            infoText.innerHTML = "面板已重置。<br>提示：你可以随意拖拽拉长射线，即使从缝隙穿过也会自动吸附。";

            for (let col = 0; col < numCols; col++) {
                const rowsForThisCol = colRowCounts[col] || 1;
                for (let row = 0; row < rowsForThisCol; row++) {
                    const skillDef = pickSkillFromPool();
                    const colorData = { name: skillDef.colorName || 'Unknown', hex: skillDef.colorHex || '#ffffff' };

                    nodes.push({
                        id: `node_${col}_${row}`, col, row, x: 0, y: 0,
                        skillDef, colorData, isSelected: false, scale: 1.0
                    });

                    // 提前静默触发缓存请求
                    if (skillDef.mask?.previewUrl) getCachedImage(skillDef.mask.previewUrl);
                    if (skillDef.background?.previewUrl) getCachedImage(skillDef.background.previewUrl);
                    if (skillDef.icon?.previewUrl) getCachedImage(skillDef.icon.previewUrl);
                    if (skillDef.border?.previewUrl) getCachedImage(skillDef.border.previewUrl);
                }
            }
            resizeCanvas();
        }

        // ==========================================
        // 全 Canvas 统一实时渲染核心主循环
        // ==========================================
        function renderLoop() {
            // 清理画布并涂刷底色
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 1. 绘制能量连线 (原本属于 SVG 的部分)
            if (chain.length > 0) {
                ctx.save();
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.lineWidth = 8;

                // 绘制已有链路
                for (let i = 0; i < chain.length - 1; i++) {
                    const start = chain[i];
                    const end = chain[i + 1];
                    ctx.save();
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = start.colorData.hex;
                    ctx.strokeStyle = start.colorData.hex;
                    ctx.beginPath();
                    ctx.moveTo(start.x, start.y);
                    ctx.lineTo(end.x, end.y);
                    ctx.stroke();
                    ctx.restore();
                }

                // 如果处于拖拽期，绘制最后一棒延展至鼠标位置的射线
                if (isDragging && chain.length <= numCols) {
                    const last = chain[chain.length - 1];
                    ctx.save();
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = last.colorData.hex;
                    ctx.strokeStyle = last.colorData.hex;
                    ctx.beginPath();
                    ctx.moveTo(last.x, last.y);
                    ctx.lineTo(currentMousePos.x, currentMousePos.y);
                    ctx.stroke();
                    ctx.restore();
                }
                ctx.restore();
            }

            // 2. 绘制技能节点 (原本属于 HTML DOM 的部分)
            nodes.forEach(node => {
                // 基于动量缓冲（补间），计算选中方块时的呼吸缩放值
                const targetScale = node.isSelected ? 1.15 : 1.0;
                node.scale += (targetScale - node.scale) * 0.2;

                ctx.save();
                ctx.translate(node.x, node.y);
                ctx.scale(node.scale, node.scale);

                // 绘制选中发光圈 (原本的 .glow 的 CSS 阴影)
                if (node.isSelected) {
                    ctx.save();
                    ctx.shadowBlur = 20;
                    ctx.shadowColor = node.colorData.hex;
                    ctx.fillStyle = 'rgba(0,0,0,0.01)'; // 触发阴影所必须绘制的微弱基色
                    ctx.beginPath();
                    ctx.roundRect(-NODE_SIZE / 2, -NODE_SIZE / 2, NODE_SIZE, NODE_SIZE, 12);
                    ctx.fill();
                    ctx.restore();
                }

                const sDef = node.skillDef;

                // 图像叠加与混合遮罩逻辑：
                // 如果开启了自定义 Mask 贴图且已成功加载，采用高级离屏合成
                let maskImg = sDef.mask?.visible && sDef.mask?.previewUrl ? getCachedImage(sDef.mask.previewUrl) : null;
                
                if (maskImg && maskImg.complete && maskImg.naturalWidth > 0) {
                    MASK_NODE_SIZE = NODE_SIZE * 0.9;
                    offscreenCanvas.width = MASK_NODE_SIZE;
                    offscreenCanvas.height = MASK_NODE_SIZE;
                    offCtx.clearRect(0, 0, MASK_NODE_SIZE, MASK_NODE_SIZE);

                    // 刷出黑白遮罩图
                    offCtx.drawImage(maskImg, 0, 0, MASK_NODE_SIZE, MASK_NODE_SIZE);

                    // 切割混合模式：仅在已绘制的遮罩图素上保留后续图形 (类似于 mask-image)
                    offCtx.globalCompositeOperation = 'source-in';

                    // 绘制背景与图标至离屏区
                    drawLayerToContext(offCtx, sDef.background, NODE_SIZE / 2, NODE_SIZE / 2);
                    drawLayerToContext(offCtx, sDef.icon, NODE_SIZE / 2, NODE_SIZE / 2);

                    // 将渲染好的切割图形画回主画布
                    ctx.drawImage(offscreenCanvas, -NODE_SIZE / 2, -NODE_SIZE / 2);
                } else {
                    // 没有 Mask 贴图时，默认执行圆角矩形内裁剪 (优雅兜底)
                    ctx.save();
                    ctx.beginPath();
                    ctx.roundRect(-NODE_SIZE / 2, -NODE_SIZE / 2, NODE_SIZE, NODE_SIZE, 8);
                    ctx.clip();

                    drawLayerToContext(ctx, sDef.background, 0, 0);
                    drawLayerToContext(ctx, sDef.icon, 0, 0);

                    ctx.restore();
                }

                // 绘制非裁剪层的顶层框边
                drawLayerToContext(ctx, sDef.border, 0, 0);

                ctx.restore();
            });

            // 3. 绘制粒子特效
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.update();
                if (p.life <= 0) particles.splice(i, 1);
                else p.draw(ctx);
            }

            requestAnimationFrame(renderLoop);
        }

        // 处理多图层偏移及缩放的通用绘制函数
        function drawLayerToContext(targetCtx, layerDef, originX, originY) {
            if (!layerDef || !layerDef.visible || !layerDef.previewUrl) return;
            const img = getCachedImage(layerDef.previewUrl);
            if (!img || !img.complete || img.naturalWidth === 0) return;

            targetCtx.save();
            const lx = (layerDef.offsetX || 0) * RATIO;
            const ly = (layerDef.offsetY || 0) * RATIO;
            const scale = layerDef.scale || 1;

            targetCtx.translate(originX + lx, originY + ly);
            targetCtx.scale(scale, scale);
            targetCtx.drawImage(img, -NODE_SIZE / 2, -NODE_SIZE / 2, NODE_SIZE, NODE_SIZE);
            targetCtx.restore();
        }

        // ==========================================
        // 核心数学交互引擎 (点到线段投影检测)
        // ==========================================
        function distToSegmentSquared(p, v, w) {
            const l2 = (w.x - v.x) ** 2 + (w.y - v.y) ** 2;
            if (l2 === 0) return (p.x - v.x) ** 2 + (p.y - v.y) ** 2;
            let t = ((p.x - v.x) * (w.x - v.x) + (p.y - v.y) * (w.y - v.y)) / l2;
            t = Math.max(0, Math.min(1, t));
            const projX = v.x + t * (w.x - v.x);
            const projY = v.y + t * (w.y - v.y);
            return (p.x - projX) ** 2 + (p.y - projY) ** 2;
        }

        function updateMousePos(e) {
            const rect = canvas.getBoundingClientRect();
            // 精确映射鼠标相对画布内的真实坐标像素
            currentMousePos.x = (e.clientX - rect.left) * (canvas.width / rect.width);
            currentMousePos.y = (e.clientY - rect.top) * (canvas.height / rect.height);
        }

        function getNodeAt(x, y) {
            const radius = NODE_SIZE / 2;
            // 矩形/圆形框交叉点检索选中的节点
            return nodes.find(n => Math.abs(n.x - x) <= radius && Math.abs(n.y - y) <= radius);
        }

        function syncSelectionState() {
            nodes.forEach(n => n.isSelected = false);
            chain.forEach(n => n.isSelected = true);
        }

        // ==========================================
        // 鼠标射线物理交互核心逻辑
        // ==========================================
        canvas.addEventListener('mousedown', (e) => {
            updateMousePos(e);
            const clickedNode = getNodeAt(currentMousePos.x, currentMousePos.y);
            if (!clickedNode) return;

            const col = clickedNode.col;
            const existingIdx = chain.findIndex(item => item.col === col);

            if (existingIdx !== -1) {
                if (chain[existingIdx] !== clickedNode) {
                    chain[existingIdx] = clickedNode;
                    chain = chain.slice(0, existingIdx + 1);
                    triggerNodeBurst(clickedNode.x, clickedNode.y, clickedNode.colorData.hex);
                    isDragging = true;
                } else {
                    chain = chain.slice(0, existingIdx + 1);
                    isDragging = true;
                }
            } else if (col === 0 && chain.length === 0) {
                isDragging = true;
                chain = [clickedNode];
                triggerNodeBurst(clickedNode.x, clickedNode.y, clickedNode.colorData.hex);
            } else if (col === chain.length) {
                isDragging = true;
                chain.push(clickedNode);
                triggerNodeBurst(clickedNode.x, clickedNode.y, clickedNode.colorData.hex);
            }
            syncSelectionState();
        });

        canvas.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            updateMousePos(e);

            const popRadiusSq = 32 * 32;
            const swapRadiusSq = 45 * 45;
            const pushRadiusSq = 65 * 65;

            let popped = false;

            // 1. 退格回切触发检测
            for (let i = chain.length - 2; i >= 0; i--) {
                const prevNode = chain[i];
                const distToPrevSq = (currentMousePos.x - prevNode.x) ** 2 + (currentMousePos.y - prevNode.y) ** 2;
                const isTouchingNode = distToPrevSq < popRadiusSq;
                const isCrossingLeftBound = currentMousePos.x < (prevNode.x + 35);

                if (isTouchingNode || isCrossingLeftBound) {
                    chain = chain.slice(0, i + 1);
                    popped = true;
                    break;
                }
            }

            if (!popped) {
                let swapped = false;

                if (chain.length > 0) {
                    const currentColIdx = chain.length - 1;
                    const targetNodes = nodes.filter(n => n.col === currentColIdx);
                    const currentNode = chain[currentColIdx];

                    const C_curr = { x: currentNode.x, y: currentNode.y };
                    let A;
                    let isFirstCol = false;

                    if (chain.length > 1) {
                        A = { x: chain[chain.length - 2].x, y: chain[chain.length - 2].y };
                    } else {
                        isFirstCol = true;
                        A = C_curr;
                    }
                    const B = currentMousePos;

                    let distToCurrSq = isFirstCol
                        ? (C_curr.x - B.x) ** 2 + (C_curr.y - B.y) ** 2
                        : distToSegmentSquared(C_curr, A, B);

                    let bestSwapNode = null;
                    let minSwapDist = swapRadiusSq;

                    // 2. 磁滞同列上下切换判定
                    for (let targetData of targetNodes) {
                        if (targetData === currentNode) continue;
                        const C = { x: targetData.x, y: targetData.y };

                        let dist = isFirstCol
                            ? (C.x - B.x) ** 2 + (C.y - B.y) ** 2
                            : distToSegmentSquared(C, A, B);

                        if (dist < minSwapDist && dist < (distToCurrSq - 600)) {
                            minSwapDist = dist;
                            bestSwapNode = targetData;
                        }
                    }

                    if (bestSwapNode) {
                        chain[currentColIdx] = bestSwapNode;
                        triggerNodeBurst(bestSwapNode.x, bestSwapNode.y, bestSwapNode.colorData.hex);
                        swapped = true;
                    }
                }

                // 3. 向前缝隙穿透吸附判定
                if (!swapped && chain.length > 0 && chain.length < numCols) {
                    const lastNode = chain[chain.length - 1];
                    const nextCol = chain.length;
                    const targetNodes = nodes.filter(n => n.col === nextCol);

                    const A = { x: lastNode.x, y: lastNode.y };
                    const B = currentMousePos;

                    let bestPushNode = null;
                    let minPushDist = pushRadiusSq;

                    for (let targetData of targetNodes) {
                        const C = { x: targetData.x, y: targetData.y };
                        const dist = distToSegmentSquared(C, A, B);
                        if (dist < minPushDist) {
                            minPushDist = dist;
                            bestPushNode = targetData;
                        }
                    }

                    if (bestPushNode) {
                        chain.push(bestPushNode);
                        triggerNodeBurst(bestPushNode.x, bestPushNode.y, bestPushNode.colorData.hex);
                    }
                }
            }

            syncSelectionState();
        });

        window.addEventListener('mouseup', () => {
            if (!isDragging) return;
            isDragging = false;
            
            if (chain.length === numCols) {
                const resonances = calculateResonance();
                infoText.innerHTML = `行动已确认！共连线 <span style="color:#fff">${chain.length}</span> 个技能。<br>最高共鸣颜色: <b style="color:${getHexByName(resonances.colorName)}">${resonances.colorName}</b> (共 ${resonances.count} 个)`;
                emitEvent("chainCompleted", { length: chain.length, resonance: resonances });
            } else if (chain.length > 0) {
                infoText.innerHTML = "<span style='color:#e74c3c'>排盘未满，可随时点击继续连接或修改当前排盘。</span>";
            }
            syncSelectionState();
        });

        // ==========================================
        // 外部通讯网关接口与功能对齐
        // ==========================================
        window.LimbusAPI = {
            setBoardConfig: function (cols, rowCounts) { numCols = cols; colRowCounts = rowCounts; initBoard(); },
            rerollBoard: function () { initBoard(); },
            autoChain: function () { executeAutoChain(); },
            setSkillPool: function (pool) { customSkillPool = Array.isArray(pool) ? pool : []; initBoard(); }
        };

        const query = new URLSearchParams(window.location.search);
        const sessionId = query.get("session") || "demo1";
        const controlChannel = typeof BroadcastChannel !== "undefined" ? new BroadcastChannel(`limbus-control-${sessionId}`) : null;

        function emitEvent(command, payload = {}, requestId = "") {
            const message = { type: "limbus-event", sessionId, command, payload, requestId };
            if (window.parent && window.parent !== window) window.parent.postMessage(message, window.location.origin);
            if (controlChannel) controlChannel.postMessage(message);
        }

        function processCommand(data) {
            if (!data || data.type !== "limbus-command" || data.sessionId !== sessionId) return;
            const { command, payload = {}, requestId = "" } = data;
            try {
                if (command === "setBoardConfig") LimbusAPI.setBoardConfig(payload.numCols, payload.colRowCounts);
                else if (command === "rerollBoard") LimbusAPI.rerollBoard();
                else if (command === "autoChain") LimbusAPI.autoChain();
                else if (command === "setSkillPool") LimbusAPI.setSkillPool(payload);
                emitEvent("ack", { ok: true, command }, requestId);
            } catch (err) { emitEvent("ack", { ok: false, error: String(err) }, requestId); }
        }

        window.addEventListener("message", (e) => { if (e.data && e.data.command === "hello") emitEvent("ready", { source: "postMessage" }); else processCommand(e.data); });
        if (controlChannel) controlChannel.addEventListener("message", (e) => { if (e.data && e.data.command === "hello") emitEvent("ready", { source: "broadcast" }); else processCommand(e.data); });

        function executeAutoChain() {
            chain = []; let prevColor = null;
            for (let c = 0; c < numCols; c++) {
                const currentColNodes = nodes.filter(n => n.col === c);
                if (!currentColNodes || currentColNodes.length === 0) continue;
                let selectedNode = currentColNodes[Math.floor(Math.random() * currentColNodes.length)];
                if (prevColor) {
                    const matchedNodes = currentColNodes.filter(node => node.colorData.name === prevColor.name);
                    if (matchedNodes.length > 0) selectedNode = matchedNodes[Math.floor(Math.random() * matchedNodes.length)];
                }
                prevColor = selectedNode.colorData;
                chain.push(selectedNode);
                
                const tx = selectedNode.x, ty = selectedNode.y, th = selectedNode.colorData.hex;
                setTimeout(() => { triggerNodeBurst(tx, ty, th); }, c * 100);
            }
            syncSelectionState();
            const resonances = calculateResonance();
            infoText.innerHTML = `已应用自动选择！<br>最高共鸣颜色: <b style="color:${getHexByName(resonances.colorName)}">${resonances.colorName}</b> (共 ${resonances.count} 个)`;
            emitEvent("chainCompleted", { length: chain.length, resonance: resonances });
        }

        function calculateResonance() {
            let counts = {}; let maxCount = 0; let maxColor = 'None';
            chain.forEach(item => {
                const cName = item.colorData.name;
                counts[cName] = (counts[cName] || 0) + 1;
                if (counts[cName] > maxCount) { maxCount = counts[cName]; maxColor = cName; }
            });
            return { colorName: maxColor, count: maxCount };
        }

        function getHexByName(name) { return (SIN_COLORS.find(c => c.name === name) || { hex: '#fff' }).hex; }

        // ==========================================
        // 引擎点火启动
        // ==========================================
        emitEvent("ready", { source: "boot" });
        initBoard();
        requestAnimationFrame(renderLoop);

    </script>
