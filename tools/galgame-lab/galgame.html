<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <base href="/">
    <title>Galgame UI 模拟器</title>
    <style>
        /* 基础样式重置与全屏设置 */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body,
        html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #f0f0f0;
            font-family: "Microsoft YaHei", sans-serif;
        }

        html.overlay-mode,
        body.overlay-mode {
            background-color: transparent;
        }

        /* 游戏主容器 */
        #game-container {
            position: relative;
            width: 100%;
            height: 100%;
            background: url('https://images.unsplash.com/photo-1518709268805-4e9042af9f23?q=80&w=1920&auto=format&fit=crop') no-repeat center center/cover;
        }

        .overlay-mode #game-container {
            background: transparent;
        }

        /* 立绘总容器 */
        #sprites-container {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            /* 防止立绘层遮挡鼠标点击剧本 */
        }

        /* 每一个独立的动态立绘 */
        .chara-sprite {
            position: absolute;
            bottom: 0;
            width: 380px;
            /* 立绘默认基础宽度 */
            transform: translateX(-50%) scale(1);
            transform-origin: bottom center;
            transition: left 0.4s ease, transform 0.4s ease, opacity 0.4s ease;
            opacity: 0;
            z-index: 5;
        }

        .overlay-mode #sprite {
            display: none;
        }

        /* 分支选项容器 */
        #choices-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 20px;
            z-index: 40;
            backdrop-filter: blur(2px);
        }

        .choice-btn {
            background: rgba(0, 0, 0, 0.8);
            color: white;
            border: 2px solid #fff;
            border-radius: 10px;
            padding: 15px 40px;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.2s;
            width: 50%;
            text-align: center;
            font-family: "Microsoft YaHei", sans-serif;
        }

        .choice-btn:hover {
            background: #fff;
            color: #000;
            transform: scale(1.02);
        }

        /* UI 总图层 */
        #ui-layer {
            position: absolute;
            width: 100%;
            height: 100%;
            transition: opacity 0.3s ease;
            z-index: 10;
            pointer-events: none;
        }

        #ui-layer>* {
            pointer-events: auto;
        }

        .hidden #ui-layer {
            opacity: 0;
            pointer-events: none;
        }

        /* 控制台 (右上角) */
        #custom-console {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #555;
            display: flex;
            gap: 5px;
            z-index: 20;
        }

        .overlay-mode #custom-console {
            display: none;
        }

        #custom-console input {
            padding: 5px;
            border-radius: 4px;
            border: none;
            outline: none;
            width: 200px;
        }

        #custom-console button {
            padding: 5px 10px;
            cursor: pointer;
            border: none;
            border-radius: 4px;
            background: #007bff;
            color: white;
        }

        #custom-console button:hover {
            background: #0056b3;
        }

        /* 对话框整体 (底部) */
        #dialogue-area {
            position: absolute;
            bottom: 30px;
            left: 10%;
            width: 80%;
        }

        /* 名字框 */
        #speaker-box {
            display: inline-block;
            background: rgba(0, 0, 0, 0.8);
            color: #fff;
            padding: 5px 20px;
            border-radius: 5px 5px 0 0;
            font-size: 20px;
            font-weight: bold;
            border: 2px solid #fff;
            border-bottom: none;
        }

        /* 文本框 */
        #text-box {
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid #fff;
            border-radius: 0 10px 10px 10px;
            padding: 20px;
            color: #fff;
            font-size: 24px;
            min-height: 150px;
            cursor: pointer;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            pointer-events: auto;
        }

        #text-content {
            flex-grow: 1;
            line-height: 1.5;
            text-shadow: 1px 1px 2px #000;
        }

        /* 底部控制按钮 */
        #controls {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 10px;
        }

        .control-btn {
            background: rgba(255, 255, 255, 0.2);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.5);
            padding: 5px 15px;
            border-radius: 15px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }

        .control-btn:hover {
            background: rgba(255, 255, 255, 0.5);
        }

        .control-btn.active {
            background: #ffaa00;
            color: #000;
            border-color: #ffaa00;
        }

        /* 历史文本界面 (模态框) */
        #history-modal {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            color: white;
            display: none;
            flex-direction: column;
            padding: 50px;
            z-index: 100;
            pointer-events: auto;
        }

        #history-modal h2 {
            margin-bottom: 20px;
            text-align: center;
        }

        #history-list {
            flex-grow: 1;
            overflow-y: auto;
            padding-right: 20px;
        }

        .history-item {
            margin-bottom: 15px;
            border-bottom: 1px solid #444;
            padding-bottom: 10px;
        }

        .history-speaker {
            font-weight: bold;
            color: #ffaa00;
            margin-bottom: 5px;
        }

        #btn-close-history {
            align-self: center;
            margin-top: 20px;
            padding: 10px 30px;
            font-size: 18px;
            cursor: pointer;
            border-radius: 5px;
            border: none;
            background: #fff;
            color: #000;
        }

        /* 滚动条样式 */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #222;
        }

        ::-webkit-scrollbar-thumb {
            background: #666;
            border-radius: 4px;
        }
    </style>
</head>

<body>

    <div id="game-container">

        <div id="sprites-container"></div>

        <div id="choices-container"></div>

        <div id="ui-layer">
            <div id="custom-console">
                <input type="text" id="console-input" placeholder="输入你想说的话..." autocomplete="off">
                <button id="btn-send">发送台词</button>
            </div>

            <div id="dialogue-area">
                <div id="speaker-box">系统</div>
                <div id="text-box">
                    <div id="text-content"></div>
                    <div id="controls">
                        <button class="control-btn" id="btn-auto">自动</button>
                        <button class="control-btn" id="btn-skip">跳过</button>
                        <button class="control-btn" id="btn-speed">速度: 1x</button>
                        <button class="control-btn" id="btn-hide">隐藏</button>
                        <button class="control-btn" id="btn-history">历史</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="history-modal">
            <h2>过往文本 (Backlog)</h2>
            <div id="history-list"></div>
            <button id="btn-close-history">返回游戏</button>
        </div>
    </div>

    <script>
        const query = new URLSearchParams(window.location.search);
        const sessionId = query.get("session") || "demo1";
        const isOverlayMode = query.get("overlay") === "1";
        const channelName = `galgame-control-${sessionId}`;
        const controlChannel = typeof BroadcastChannel !== "undefined"
            ? new BroadcastChannel(channelName)
            : null;
        if (isOverlayMode) {
            document.documentElement.classList.add("overlay-mode");
            document.body.classList.add("overlay-mode");
        }

        window.addEventListener("keydown", (event) => {
            if (!isOverlayMode) return;
            window.parent.postMessage(
                { type: "galgame-keydown", key: event.key, code: event.code, repeat: event.repeat },
                window.location.origin
            );
        });

        // --- 数据与状态 ---
        let scriptData = [
            { speaker: "向导", text: "欢迎来到纯前端构建的 Galgame 界面。" },
            { speaker: "向导", text: "我现在为你集成了外部 API 接口。" },
            { speaker: "向导", text: "你可以打开浏览器控制台，输入 window.GalgameAPI 来调用它们。" }
        ];

        let currentIndex = 0;
        let isTyping = false;
        let currentText = "";
        let typeIndex = 0;
        let isWaitingForChoice = false; // 是否正在等待玩家选择

        let state = {
            auto: false,
            skip: false,
            speed: 1,
            hidden: false
        };

        let historyLog = [];
        let typeTimer = null;
        let autoNextTimer = null;

        // --- DOM 元素获取 ---
        const gameContainer = document.getElementById('game-container');
        const spriteEl = document.getElementById('sprite');
        const choicesContainer = document.getElementById('choices-container');
        const speakerBox = document.getElementById('speaker-box');
        const textContent = document.getElementById('text-content');

        const btnAuto = document.getElementById('btn-auto');
        const btnSkip = document.getElementById('btn-skip');
        const btnSpeed = document.getElementById('btn-speed');
        const btnHide = document.getElementById('btn-hide');
        const btnHistory = document.getElementById('btn-history');

        const historyModal = document.getElementById('history-modal');
        const historyList = document.getElementById('history-list');
        const btnCloseHistory = document.getElementById('btn-close-history');

        const consoleInput = document.getElementById('console-input');
        const btnSend = document.getElementById('btn-send');

        // ==========================================
        // ⭐ 外部 API 接口定义 ⭐
        // ==========================================
        window.GalgameAPI = {
            /**
             * 1. 设置历史记录
             * @param {Array} historyArray - 例: [{speaker: 'A', text: '你好'}, ...]
             */
            setHistory: function (historyArray) {
                historyLog = [...historyArray];
                historyList.innerHTML = '';
                historyLog.forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'history-item';
                    div.innerHTML = `<div class="history-speaker">${item.speaker}</div><div>${item.text}</div>`;
                    historyList.appendChild(div);
                });
            },

            /**
             * 2. 设置立绘显示和位置
             * @param {String} imageUrl - 图片URL，传入空字符串或null可隐藏立绘
             * @param {Object} options - 配置对象 { x: '50%', y: '0px', width: '400px', height: '600px', scale: 1 }
             */
            setSprite: function (id, url, options = {}) {
                const container = document.getElementById('sprites-container');
                if (!container) return;

                // 1. 寻找对应 ID 的立绘组件
                let spriteImg = document.getElementById(`sprite-${id}`);

                // 2. 如果 url 为空，执行淡出并移除该角色立绘
                if (!url) {
                    if (spriteImg) {
                        spriteImg.style.opacity = 0;
                        setTimeout(() => spriteImg.remove(), 400); // 400ms动画结束后彻底从网页移除
                    }
                    return;
                }

                // 3. 如果该 ID 的立绘不存在，则动态创建一个 <img> 标签插入容器
                if (!spriteImg) {
                    spriteImg = document.createElement('img');
                    spriteImg.id = `sprite-${id}`;
                    spriteImg.className = 'chara-sprite';
                    container.appendChild(spriteImg);
                }

                // 4. 更换图片源
                spriteImg.src = url;

                // 5. 解析并应用样式参数
                const x = options.x || '50%';
                const scale = options.scale !== undefined ? options.scale : 1;
                const zIndex = options.zIndex || 5;

                spriteImg.style.left = x;
                spriteImg.style.zIndex = zIndex;

                // 6. 图片加载完成后触发动效
                spriteImg.onload = () => {
                    spriteImg.style.opacity = 1;
                    spriteImg.style.transform = `translateX(-50%) scale(${scale})`;
                };
            },

            /**
             * 3. 设置当前对话 (立即中断并播放)
             * @param {String} speaker - 说话者
             * @param {String} text - 文本
             */
            setCurrentDialogue: function (speaker, text) {
                clearTimeout(typeTimer);
                clearTimeout(autoNextTimer);

                // 🌟 强行打断时，关闭可能存在的选项面板
                if (isWaitingForChoice) {
                    document.getElementById('choices-container').style.display = 'none';
                    isWaitingForChoice = false;
                }
                speakerBox.innerText = speaker;
                currentText = text;
                addToHistory(speaker, text);

                if (state.skip) {
                    finishTyping();
                } else {
                    textContent.innerHTML = "";
                    typeIndex = 0;
                    isTyping = true;
                    typeWriter();
                }
            },

            /**
             * 4. 设置之后的对话脚本
             * @param {Array} dialogues - 脚本数组 [{speaker: 'A', text: '...'}, ...]
             * @param {Boolean} replace - true:清除当前句之后的所有旧脚本; false:在末尾追加
             */
            setNextDialogues: function (dialogues, replace = true) {
                if (replace) {
                    scriptData.splice(currentIndex + 1); // 截断未来的脚本
                }
                scriptData.push(...dialogues);

                // 如果原本处于结束停滞状态，可以重新开始播
                if (currentIndex >= scriptData.length - dialogues.length && !isTyping && !isWaitingForChoice) {
                    advanceStory();
                }
            },

            /**
             * 5. 设置分支选择
             * @param {Array} choices - 选项数组 [{ text: '去救她', action: function(){} }, ...]
             */
            setChoices: function (choices) {
                choicesContainer.innerHTML = '';
                choicesContainer.style.display = 'flex';
                isWaitingForChoice = true;

                // 强制暂停自动/跳过模式
                state.auto = false;
                state.skip = false;
                btnAuto.classList.remove('active');
                btnSkip.classList.remove('active');
                clearTimeout(autoNextTimer);

                choices.forEach(choice => {
                    const btn = document.createElement('button');
                    btn.className = 'choice-btn';
                    btn.innerText = choice.text;
                    btn.onclick = () => {
                        choicesContainer.style.display = 'none';
                        isWaitingForChoice = false;
                        addToHistory("玩家", `【选择】${choice.text}`);

                        if (typeof choice.action === 'function') {
                            choice.action(); // 执行对应的回调代码
                        }
                        advanceStory(); // 执行完回调后推进故事
                    };
                    choicesContainer.appendChild(btn);
                });
            }
        };
        // ==========================================

        function emitGameEvent(command, payload = {}, requestId = "") {
            const message = {
                type: "galgame-event",
                sessionId,
                command,
                payload,
                requestId
            };

            if (window.parent && window.parent !== window) {
                window.parent.postMessage(message, window.location.origin);
            }
            if (window.opener && !window.opener.closed) {
                window.opener.postMessage(message, window.location.origin);
            }
            if (controlChannel) {
                controlChannel.postMessage(message);
            }
        }

        function processGalgameCommand(data) {
            if (!data || data.type !== "galgame-command") return;
            if (data.sessionId !== sessionId) return;

            const { command, payload = {}, requestId = "" } = data;
            const api = window.GalgameAPI;
            if (!api) return;

            try {
                switch (command) {
                    case "setCurrentDialogue":
                        api.setCurrentDialogue(payload.speaker || "系统", payload.text || "");
                        break;
                    case "setSprite":
                        // 为控制台手动设置的立绘默认分配 "default" ID
                        api.setSprite("default", payload.imageUrl, payload.options || {});
                        break;
                    case "setChoices": {
                        const choices = Array.isArray(payload.choices) ? payload.choices : [];
                        api.setChoices(choices.map(choice => ({
                            text: choice.text || "新选项",
                            action: () => {
                                api.setCurrentDialogue("系统", `玩家选择了：【${choice.text || "新选项"}】`);
                            }
                        })));
                        break;
                    }
                    case "setNextDialogues":
                        api.setNextDialogues(
                            Array.isArray(payload.dialogues) ? payload.dialogues : [],
                            payload.replace !== false
                        );
                        break;
                    default:
                        emitGameEvent("ack", { ok: false, command, error: "unsupported-command" }, requestId);
                        return;
                }

                emitGameEvent("ack", { ok: true, command }, requestId);
            } catch (err) {
                emitGameEvent("ack", {
                    ok: false,
                    command,
                    error: err instanceof Error ? err.message : String(err)
                }, requestId);
                console.error("[galgame] 处理控制台指令失败:", command, err);
            }
        }

        window.addEventListener("message", (event) => {
            if (event.origin !== window.location.origin) return;

            const data = event.data;
            if (!data || data.sessionId !== sessionId) return;

            if (data.type === "galgame-event" && data.command === "hello") {
                emitGameEvent("ready", { source: "postMessage" });
                return;
            }

            processGalgameCommand(data);
        });

        if (controlChannel) {
            controlChannel.addEventListener("message", (event) => {
                const data = event.data;
                if (!data || data.sessionId !== sessionId) return;

                if (data.type === "galgame-event" && data.command === "hello") {
                    emitGameEvent("ready", { source: "broadcast" });
                    return;
                }

                processGalgameCommand(data);
            });
        }


        // --- 核心逻辑 ---
        //  playDialogue 函数
        function playDialogue() {
            clearTimeout(typeTimer);
            clearTimeout(autoNextTimer);

            if (currentIndex >= scriptData.length) {
                textContent.innerHTML = "<i>（脚本已结束。请使用控制台添加新台词，或调用API）</i>";
                speakerBox.innerText = "系统";
                return;
            }

            const line = scriptData[currentIndex];
            speakerBox.innerText = line.speaker;
            currentText = line.text;

            // 🌟 1. 兼容旧版的单立绘配置 (固定分配一个叫 "default" 的 ID)
            if (line.sprite !== undefined) {
                window.GalgameAPI.setSprite("default", line.sprite.url, line.sprite);
            }

            // 🌟 2. 新增逻辑：支持全新的多立绘配置 (sprites)
            if (line.sprites !== undefined && typeof line.sprites === 'object') {
                for (const charaId in line.sprites) {
                    const config = line.sprites[charaId];
                    if (!config || config.url === "") {
                        window.GalgameAPI.setSprite(charaId, "");
                    } else {
                        window.GalgameAPI.setSprite(charaId, config.url, config);
                    }
                }
            }
            addToHistory(line.speaker, line.text);

            if (state.skip) {
                finishTyping();
            } else {
                textContent.innerHTML = "";
                typeIndex = 0;
                isTyping = true;
                typeWriter();
            }
        }

        function typeWriter() {
            if (typeIndex < currentText.length) {
                textContent.innerHTML += currentText.charAt(typeIndex);
                typeIndex++;

                let delay = 50;
                if (state.speed === 2) delay = 25;
                if (state.speed === 3) delay = 10;

                typeTimer = setTimeout(typeWriter, delay);
            } else {
                finishTyping();
            }
        }

        // 替换原有的 finishTyping 函数
        function finishTyping() {
            isTyping = false;
            textContent.innerHTML = currentText;

            const currentLine = scriptData[currentIndex];

            // 🌟 新增逻辑：检测当前剧本节点是否带有 choices 数组
            if (currentLine && currentLine.choices && Array.isArray(currentLine.choices) && currentLine.choices.length > 0) {
                if (!isWaitingForChoice) {
                    window.GalgameAPI.setChoices(currentLine.choices.map(choice => ({
                        text: choice.text,
                        action: () => {
                            // 如果选项中带有 nextDialogues 数据，则覆盖后续剧本
                            if (choice.nextDialogues) {
                                window.GalgameAPI.setNextDialogues(choice.nextDialogues, true);
                            } else {
                                // 如果没有配置后续剧本的兜底行为
                                window.GalgameAPI.setCurrentDialogue("系统", `玩家选择了：【${choice.text}】`);
                            }
                        }
                    })));
                }
                return; // 带有选项时，在此阻断，禁止自动/跳过模式进入下一句
            }

            if (isWaitingForChoice) return; // 等待选项时禁止推进

            if (state.skip) {
                autoNextTimer = setTimeout(advanceStory, 100);
            } else if (state.auto) {
                let waitTime = 1500 / state.speed;
                autoNextTimer = setTimeout(advanceStory, waitTime);
            }
        }

        function advanceStory() {
            if (isWaitingForChoice) return; // 等待选项时禁止推进

            if (isTyping) {
                clearTimeout(typeTimer);
                finishTyping();
            } else {
                if (currentIndex < scriptData.length) {
                    currentIndex++;
                    playDialogue();
                }
            }
        }

        function addToHistory(speaker, text) {
            historyLog.push({ speaker, text });
            const div = document.createElement('div');
            div.className = 'history-item';
            div.innerHTML = `<div class="history-speaker">${speaker}</div><div>${text}</div>`;
            historyList.appendChild(div);
        }

        // --- 事件监听 ---
        gameContainer.addEventListener('click', (e) => {
            if (state.hidden) {
                state.hidden = false;
                gameContainer.classList.remove('hidden');
                return;
            }

            // 点击按钮、控制台、选项等不推进文本
            if (e.target.closest('#controls') || e.target.closest('#custom-console') || e.target.closest('#history-modal') || e.target.closest('.choice-btn')) {
                return;
            }

            if (isWaitingForChoice) return;

            if (state.skip) { state.skip = false; btnSkip.classList.remove('active'); }
            if (state.auto) { state.auto = false; btnAuto.classList.remove('active'); clearTimeout(autoNextTimer); }

            advanceStory();
        });

        btnAuto.addEventListener('click', () => {
            if (isWaitingForChoice) return;
            state.auto = !state.auto;
            btnAuto.classList.toggle('active', state.auto);
            if (state.auto && state.skip) { state.skip = false; btnSkip.classList.remove('active'); }
            if (state.auto && !isTyping) advanceStory();
        });

        btnSkip.addEventListener('click', () => {
            if (isWaitingForChoice) return;
            state.skip = !state.skip;
            btnSkip.classList.toggle('active', state.skip);
            if (state.skip && state.auto) { state.auto = false; btnAuto.classList.remove('active'); }
            if (state.skip && !isTyping) advanceStory();
            else if (state.skip && isTyping) finishTyping();
        });

        btnSpeed.addEventListener('click', () => {
            state.speed = state.speed >= 3 ? 1 : state.speed + 1;
            btnSpeed.innerText = `速度: ${state.speed}x`;
        });

        btnHide.addEventListener('click', () => {
            state.hidden = true;
            gameContainer.classList.add('hidden');
        });

        btnHistory.addEventListener('click', () => {
            historyModal.style.display = 'flex';
            historyList.scrollTop = historyList.scrollHeight;
        });
        btnCloseHistory.addEventListener('click', () => {
            historyModal.style.display = 'none';
        });

        btnSend.addEventListener('click', () => {
            const text = consoleInput.value.trim();
            if (text) {
                scriptData.push({ speaker: "测试员", text: text });
                consoleInput.value = '';
                if (currentIndex >= scriptData.length - 1 && !isTyping && !isWaitingForChoice) {
                    currentIndex = scriptData.length - 1;
                    playDialogue();
                }
            }
        });
        consoleInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') btnSend.click();
        });

        // 启动游戏
        playDialogue();
        emitGameEvent("ready", { source: "boot" });

    </script>
</body>

</html>
